function pickQuip(tier, subs, rank) {
  var pool = QUIPS[tier.name] || [tier.name];
  if (!pool.length) return '';
  var q = pool[Math.floor(Math.random() * pool.length)];
  var best = subs[0], worst = subs[0];
  for (var i = 1; i < subs.length; i++) {
    if (subs[i].score / subs[i].max > best.score / best.max) best = subs[i];
    if (subs[i].score / subs[i].max < worst.score / worst.max) worst = subs[i];
  }
  return q.replace(/\{best\}/g, best.name).replace(/\{worst\}/g, worst.name)
          .replace(/\{bs\}/g, best.score).replace(/\{ws\}/g, worst.score)
          .replace(/\{rank\}/g, rank.toLocaleString());
}

function getAdmit(total) {
  var keys = Object.keys(ADMIT).map(Number).sort(function(a,b){return b-a;});
  var key = 0;
  for (var i = 0; i < keys.length; i++) { if (total >= keys[i]) { key = keys[i]; break; } }
  var pool = ADMIT[String(key)];
  return pool[Math.floor(Math.random() * pool.length)];
}

  for (var ei = 0; ei < EASTER_EGGS.length; ei++) {
    var e = EASTER_EGGS[ei];
    for (var mj = 0; mj < e.m.length; mj++) { if (cn.indexOf(e.m[mj].toLowerCase()) >= 0) { egg = e; break; } }
    if (egg) break;
  }
  if (egg && egg.ov) {
    if (egg.total) {
      total = egg.total[0] === egg.total[1] ? egg.total[0] : r(egg.total[0], egg.total[1]);
      var ratio = total / 750;
      for (var k2 = 0; k2 < subs.length; k2++) subs[k2].score = Math.max(1, Math.min(subs[k2].max, Math.round(subs[k2].max * ratio * (0.8 + Math.random() * 0.4))));
      var diff = total - subs.reduce(function(s,x){return s+x.score;},0);
      if (diff) subs[0].score = Math.max(1, Math.min(subs[0].max, subs[0].score + diff));
    }
    if (egg.rank) rank = r(egg.rank[0], egg.rank[1]);
    tier = {name:egg.tier || tier.name, emoji:egg.emoji || tier.emoji};
    if (egg.school) admit = {s:egg.school, m:egg.major, t:egg.tag || ''};
    if (egg.quip) quip = egg.quip;
  } else if (egg) {
    if (egg.tier) { tier = {name:egg.tier, emoji:egg.emoji}; }
    if (egg.school) admit = {s:egg.school, m:egg.major, t:egg.tag || ''};
    if (egg.quip) quip = egg.quip;
  }
  var easter = (egg && egg.easter) ? egg.easter : null;
  var _eggName = egg ? (egg.ov ? egg.tier : egg.m[0]) : null;
  var _eggCount = 0, _eggTotal = 0;

  return {name:name,examId:examId,tier:tier,subs:subs,total:total,rank:rank,admit:admit,quip:quip,subsStr:subsStr,easter:easter,_eggName:_eggName,_eggCount:_eggCount,_eggTotal:_eggTotal};
}

function barColor(score,max) {
  var p=score/max;
  if (p>=.9) return 'linear-gradient(90deg,#f0c060,#ffe8b0)';
  if (p>=.7) return 'linear-gradient(90deg,#6fcf97,#4ade80)';
  if (p>=.5) return 'linear-gradient(90deg,#22d3ee,#67e8f9)';
  if (p>=.3) return 'linear-gradient(90deg,#fb923c,#fbbf24)';
  return 'linear-gradient(90deg,#ef4444,#f87171)';
}
function scoreColor(score,max) {
  var p=score/max;
  if (p>=.9) return '#f0c060'; if (p>=.7) return '#6fcf97'; if (p>=.5) return '#22d3ee'; if (p>=.3) return '#fb923c'; return '#ef4444';
}

function checkName(raw, callback) {
  if (!raw) return callback('匿名考生');
  var s = raw.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
  if (!s || s.length < 2) return callback(s || '匿名考生');

  fetch('api/checkname.php', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'name=' + encodeURIComponent(s)
  }).then(function(r){return r.json()}).then(function(data){
    callback(data.safe ? s : '匿名考生');
  }).catch(function(){
    callback(s); // 后端不可用时放行
  });
}

  var dataUrl = null;
  try { dataUrl = cv.toDataURL('image/png'); } catch(e) { dataUrl = null; }
  if (pl) pl.style.display = 'none';
  if (dataUrl) {
    if (pi) { pi.src = dataUrl; pi.style.display = 'block'; }
    if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; }
  } else {
    if (pi && pi.parentNode) { cv.className = 'poster-img'; cv.style.display = 'block'; pi.parentNode.replaceChild(cv, pi); }
    var hint = document.querySelector('.poster-hint'); if (hint) hint.textContent = '当前环境无法导出图片，部署到线上即可正常保存。';
  }
}

render();
</script>

</body>
