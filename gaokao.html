function pickQuip(tier, subs, rank) {
  var pool = QUIPS[tier.name] || [tier.name];
  if (!pool.length) return '';
  var q = pool[Math.floor(Math.random() * pool.length)];
  var best = subs[0], worst = subs[0];
  for (var i = 1; i < subs.length; i++) {
    if (subs[i].score / subs[i].max > best.score / best.max) best = subs[i];
    if (subs[i].score / subs[i].max < worst.score / worst.max) worst = subs[i];
  }
  return q.replace(/\{best\}/g, best.name).replace(/\{worst\}/g, worst.name)
          .replace(/\{bs\}/g, best.score).replace(/\{ws\}/g, worst.score)
          .replace(/\{rank\}/g, rank.toLocaleString());
}

function getAdmit(total) {
  var keys = Object.keys(ADMIT).map(Number).sort(function(a,b){return b-a;});
  var key = 0;
  for (var i = 0; i < keys.length; i++) { if (total >= keys[i]) { key = keys[i]; break; } }
  var pool = ADMIT[String(key)];
  return pool[Math.floor(Math.random() * pool.length)];
}

  for (var i=0;i<TIERS.length;i++) { roll-=TIERS[i].w; if (roll<=0) return TIERS[i]; }
  return TIERS[0];
}

  else if (cn.indexOf('锦鲤')>=0||cn.indexOf('保佑')>=0||cn.indexOf('好运')>=0)
    easter = '🙏 锦鲤附体！魔法店给每个考生都施了祝福魔法，祝金榜题名！';
  else if (cn.indexOf('原神')>=0||cn.indexOf('启动')>=0)
    easter = '🎮 玩原神玩的？先别启动了，看看分再说。';
  else if (cn.indexOf('店主')>=0||cn.indexOf('老板')>=0)
    easter = '🧹 店主说：本店不给自己人查分，怕看了伤心。但……来都来了。';
  else if (cn.indexOf('抽象')>=0)
    easter = '💀 抽象人，抽象魂。你的分数……可能比这更抽象。';
  else if (cn.indexOf('摆烂')>=0||cn.indexOf('躺平')>=0)
    easter = '🛏️ 摆烂归摆烂，分数还是要查的。万一祖宗保佑了呢？';

  var zxf = (cn.indexOf('张雪峰')>=0);
  if (zxf) {
    for (var k = 0; k < subs.length; k++) subs[k].score = r(subs[k].max * 0.3, subs[k].max * 0.5);
    total = 250;
    rank = r(500000, 800000);
    tier = {name:'张雪峰の祝福',emoji:'🎤'};
    admit = {s:'郑州大学',m:'给排水专业',t:'张雪峰の祝福'};
    quip = '你考不过我你信吗？';
    easter = '🎤 张雪峰老师看了一眼你的成绩单，微微一笑："你考不过我你信吗？"';
  }

  return {name:name,examId:examId,tier:tier,subs:subs,total:total,rank:rank,admit:admit,quip:quip,subsStr:subsStr,easter:easter};
}

function esc(s) {
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function barColor(score,max) {
  var p=score/max;
  if (p>=.9) return 'linear-gradient(90deg,#f0c060,#ffe8b0)';
  if (p>=.7) return 'linear-gradient(90deg,#6fcf97,#4ade80)';
  if (p>=.5) return 'linear-gradient(90deg,#22d3ee,#67e8f9)';
  if (p>=.3) return 'linear-gradient(90deg,#fb923c,#fbbf24)';
  return 'linear-gradient(90deg,#ef4444,#f87171)';
}
function scoreColor(score,max) {
  var p=score/max;
  if (p>=.9) return '#f0c060'; if (p>=.7) return '#6fcf97'; if (p>=.5) return '#22d3ee'; if (p>=.3) return '#fb923c'; return '#ef4444';
}

  document.querySelectorAll('#primePills .pill').forEach(function(el){

    });
  });
}

function checkName(raw) {
  if (!raw) return '匿名考生';
  var s = raw.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
  if (!s) return '匿名考生';
  for (var i = 0; i < s.length; i++)
    for (var j = i + 2; j <= s.length && j - i <= 10; j++)
      if (SENSITIVE_SET.has(s.substring(i, j))) return '匿名考生';
  return s;
}

function submit() {
  var nEl=document.getElementById('inpName'), eEl=document.getElementById('inpExam');
  var rawName=(nEl&&nEl.value||'').trim()||'匿名考生';
  var name = checkName(rawName);
  var examId=(eEl&&eEl.value||'').trim()||(CURRENT_YEAR+'01'+String(Math.floor(Math.random()*900000+100000)));
  lastName = name; lastExamId = examId;

  result = genResult(name,examId,selectedPrime,selectedElecs.slice());
  state = 'loading';
  renderLoading();
  doLoading();
}

async function doLoading() {
  var list=document.getElementById('stageList'); if(!list) return;
  for (var i=0;i<STAGES.length;i++) {
    var item=document.createElement('div');
    item.className='stage-item show current';
    item.innerHTML='<span class="stage-dot"></span>'+STAGES[i];
    list.appendChild(item);
    if (i>0) { var prev=list.children[i-1]; prev.classList.remove('current'); prev.classList.add('done'); }
        var delay=200+Math.random()*350;
    await sleep(delay);
    if (state!=='loading') return;
  }
  var last=list.children[list.children.length-1];
  if (last) { last.classList.remove('current'); last.classList.add('done'); }
  await sleep(300);
  if (state!=='loading') return;
  state='result';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function buildPoster() {
  var d = result;
  var W = POSTER_W, H = POSTER_H, pad = 36;
  var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');
  var FONT = '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif';

  ctx.fillStyle = '#1a1520'; ctx.fillRect(0, 0, W, H);
  var g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, 'rgba(239,68,68,.08)'); g.addColorStop(1, 'rgba(240,192,96,.05)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#241e2a'; roundRect(ctx, pad, pad, W - pad*2, H - pad*2, 24); ctx.fill();
  var bar = ctx.createLinearGradient(pad, 0, W - pad, 0);
  bar.addColorStop(0, '#ef4444'); bar.addColorStop(.5, '#f0c060'); bar.addColorStop(1, '#ef4444');
  ctx.fillStyle = bar; roundRect(ctx, pad, pad, W - pad*2, 5, 3); ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ef4444'; ctx.font = '600 16px ' + FONT;
  ctx.fillText('🎓 ' + CURRENT_YEAR + ' 年高考出分模拟', W/2, 80);

  ctx.fillStyle = '#f0c060'; ctx.font = '800 30px ' + FONT;
  ctx.fillText('高 考 成 绩 单', W/2, 125);

  ctx.fillStyle = '#8a7e9a'; ctx.font = '13px ' + FONT;
  ctx.fillText('考生：'+d.name+'   考号：'+d.examId, W/2, 158);
  ctx.fillText('选考科目：'+d.subsStr, W/2, 178);

  // Subjects table
  var cellW = 400, cellH = 30, tableX = (W - cellW) / 2, tableY = 200;
  var subNames = d.subs;
  ctx.textAlign = 'left';
  for (var i = 0; i < subNames.length; i++) {
    var s = subNames[i], y = tableY + i * (cellH + 6);
    var pct = s.score / s.max;

    ctx.fillStyle = 'rgba(255,255,255,.03)'; roundRect(ctx, tableX, y, cellW, cellH, 6); ctx.fill();

    ctx.fillStyle = '#8a7e9a'; ctx.font = '13px ' + FONT;
    ctx.fillText(s.name, tableX + 14, y + 21);

    var barX = tableX + 60, barW = cellW - 140, barH = 8;
    ctx.fillStyle = '#3a3045'; roundRect(ctx, barX, y + 11, barW, barH, 4); ctx.fill();
    var barFill;
    if (pct >= 0.9) { barFill = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0); barFill.addColorStop(0, '#f0c060'); barFill.addColorStop(1, '#ffe8b0'); }
    else if (pct >= 0.7) { barFill = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0); barFill.addColorStop(0, '#6fcf97'); barFill.addColorStop(1, '#4ade80'); }
    else if (pct >= 0.5) { barFill = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0); barFill.addColorStop(0, '#22d3ee'); barFill.addColorStop(1, '#67e8f9'); }
    else { barFill = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0); barFill.addColorStop(0, '#fb923c'); barFill.addColorStop(1, '#fbbf24'); }
    ctx.fillStyle = barFill; roundRect(ctx, barX, y + 11, barW * pct, barH, 4); ctx.fill();

    ctx.textAlign = 'right';
    ctx.fillStyle = pct >= 0.9 ? '#f0c060' : pct >= 0.7 ? '#6fcf97' : pct >= 0.5 ? '#22d3ee' : '#fb923c';
    ctx.font = '700 15px ' + FONT;
    ctx.fillText(s.score, tableX + cellW - 50, y + 21);
    ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT;
    ctx.fillText('/'+s.max, tableX + cellW - 14, y + 21);
  }

  var totalY = tableY + subNames.length * (cellH + 6) + 14;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8a7e9a'; ctx.font = '12px ' + FONT;
  ctx.fillText('总 分', W/2, totalY + 10);
  ctx.fillStyle = '#f0c060'; ctx.font = '900 56px ' + FONT;
  ctx.fillText(d.total, W/2, totalY + 58);
  ctx.fillStyle = '#8a7e9a'; ctx.font = '13px ' + FONT;
  ctx.fillText('省内排名：第 '+d.rank.toLocaleString()+' 名 · '+d.tier.emoji+' '+d.tier.name, W/2, totalY + 82);

  var admitY = totalY + 106;
  ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT; ctx.fillText('🎓 模拟录取结果', W/2, admitY);
  ctx.fillStyle = '#e0d8ec'; ctx.font = '700 22px ' + FONT;
  ctx.fillText(d.admit.s, W/2, admitY + 30);
  ctx.fillStyle = '#8a7e9a'; ctx.font = '14px ' + FONT;
  ctx.fillText(d.admit.m, W/2, admitY + 54);

  var quipLines = wrapToLines(ctx, d.quip, W - pad*2 - 40);
  ctx.fillStyle = 'rgba(240,192,96,.7)'; ctx.font = '13px ' + FONT;
  var qy = admitY + 84;
  for (var j = 0; j < quipLines.length && j < 2; j++) ctx.fillText(quipLines[j], W/2, qy + j*22);

  var siteImg = await loadImg(QR_IMG), qqImg = await loadImg(QQ_IMG);
  var qs = 114, gap = 40, tqw = qs*2 + gap;
  var lx = (W - tqw) / 2, rx = lx + qs + gap;
  var qY = H - pad - 170;
  drawQRBox(ctx, siteImg, lx, qY, qs, '扫码开测', SITE_URL, '#f0c060');
  drawQRBox(ctx, qqImg, rx, qY, qs, '加 QQ 群', '群号 '+QQ_GROUP, '#b89fff');

  ctx.textAlign = 'center';
  ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT;
  ctx.fillText('霧雨魔法店 · 纯属娱乐 · 祝各位考生金榜题名 ✨', W/2, H - pad - 14);

  var pi = document.getElementById('posterImg'), pl = document.getElementById('posterLoading'), dl = document.getElementById('posterDl');
  var dataUrl = null;
  try { dataUrl = cv.toDataURL('image/png'); } catch(e) { dataUrl = null; }
  if (pl) pl.style.display = 'none';
  if (dataUrl) {
    if (pi) { pi.src = dataUrl; pi.style.display = 'block'; }
    if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; }
  } else {
    if (pi && pi.parentNode) { cv.className = 'poster-img'; cv.style.display = 'block'; pi.parentNode.replaceChild(cv, pi); }
    var hint = document.querySelector('.poster-hint'); if (hint) hint.textContent = '当前环境无法导出图片，部署到线上即可正常保存。';
  }
}

render();
</script>
