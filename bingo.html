<style>
.container { padding: 32px 26px; }

/* ── 页面组件 ── */
.head { text-align: center; }
.head h1 { font-size: 25px; margin-bottom: 8px; }
.head .sub { font-size: 12.5px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
.status { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.status b { color: var(--gold); font-weight: 700; }
.status .hot b { color: var(--pink); }

/* ── 宾果棋盘 ── */
.bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 18px; }
.cell {
 aspect-ratio: 1 / 1; border: 1px solid var(--border); border-radius: 10px;
 background: rgba(255,255,255,.02); color: var(--muted);
 font-size: 10.5px; line-height: 1.25; padding: 5px 4px;
 display: flex; align-items: center; justify-content: center; text-align: center;
 cursor: pointer; transition: background .15s, color .15s, border-color .15s, box-shadow .2s;
 word-break: break-all; overflow: hidden; user-select: none; -webkit-user-select: none;
}
.cell:hover { border-color: var(--purple); }
.cell:active { transform: scale(.97); }
.cell.on {
 background: linear-gradient(135deg, var(--gold), #ffe1a0); color: #2a2012;
 border-color: var(--gold); font-weight: 700; box-shadow: 0 0 10px rgba(240,192,96,.22);
}
.cell.line { box-shadow: 0 0 0 2px var(--gold), 0 0 16px rgba(240,192,96,.55); animation: line-pop .4s ease; position: relative; z-index: 1; }
.cell.ro { cursor: default; }
.cell.ro:hover { border-color: var(--border); }
.cell.ro.on:hover { border-color: var(--gold); }
@keyframes line-pop { 0%{transform:scale(.9)} 60%{transform:scale(1.07)} 100%{transform:scale(1)} }
.bingo-grid.mini .cell { font-size: 9px; border-radius: 8px; padding: 3px; }

/* ── 返回链接 ── */
.back-link {
 display: inline-flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer;
 font-family: inherit; font-size: 12px; color: var(--muted); padding: 4px 0; margin-bottom: 12px; transition: color .2s;
}
.back-link:hover { color: var(--gold); }

/* ── 结果页 ── */
.result { text-align: center; }
.result-emoji { font-size: 64px; margin-bottom: 6px; display: inline-block; animation: pop .5s cubic-bezier(.2,1.4,.4,1); }
@keyframes pop { 0%{transform:scale(0)} 60%{transform:scale(1.12)} 100%{transform:scale(1)} }
.result-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.result-desc {
 text-align: left; font-size: 13px; line-height: 1.8; color: var(--text);
 background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px;
}
.index-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 6px 0 4px; }
.index-fill { height: 100%; border-radius: 4px; transition: width .5s; background: linear-gradient(90deg, var(--green), var(--gold), var(--pink)); }
.index-label { font-size: 11px; color: var(--muted); margin-bottom: 16px; }

/* ── 海报 ── */
.poster-wrap { text-align: center; }
.poster-img { width: 100%; max-width: 320px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,.4); margin: 0 auto 14px; }
.poster-hint { font-size: 11px; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
.loading-orb { width: 56px; height: 56px; }

/* ── Toast ── */
.toast {
 position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(10px);
 background: rgba(36,30,42,.97); border: 1px solid var(--gold); color: var(--gold);
 padding: 10px 18px; border-radius: 24px; font-size: 13px; font-weight: 700;
 box-shadow: 0 8px 32px rgba(0,0,0,.5); opacity: 0; pointer-events: none;
 transition: opacity .3s, transform .3s; z-index: 300; white-space: nowrap; max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 420px) {
 .container { padding: 24px 16px; }
 .head h1 { font-size: 21px; }
 .cell { font-size: 9.5px; padding: 4px 3px; border-radius: 8px; }
 .bingo-grid { gap: 4px; }
}
@media (prefers-reduced-motion: reduce) {
 .cell.line, .result-emoji, .loading-orb { animation: none !important; }
}
</style>

var state = 'select';

}
function stats() {
 var m = on.filter(Boolean).length;

 '<div class="bingo-grid" id="grid"></div>' +
 '<button class="btn btn-main" onclick="goResult()">📜 查看我的鉴定结果</button>' +

}

function toggle(i) { on[i] = !on[i]; refreshSelect(); }

function refreshSelect() {
 var cells = document.querySelectorAll('#grid .cell');

 s.done.forEach(function(l){ LINES[l].forEach(function(i){ inLine[i] = true; }); });

 cells[i].classList.toggle('on', on[i]);

 document.getElementById('stLines').textContent = s.L;
 if (s.L > 0 && !shownToasts[s.L]) { shownToasts[s.L] = 1; fireToast(s.L); }

function resetAll() { on = new Array(25).fill(false); shownToasts = {}; refreshSelect(); }
function goResult() {

}
function backToEdit() { state = 'select'; render(); }

 if (L >= 5) return { k:'master', e:'🪄', t:'宗师 · 社恐天花板', c:'var(--gold)', tags:['宅之化身','副本：出门','社恐封顶'] };

function pickQuip(k, s) {
 var pool = QUIPS[k] || [];
 if (!pool.length) return '';
 var q = pool[Math.floor(Math.random() * pool.length)];
 return q.replace(/\{L\}/g, s.L).replace(/\{m\}/g, s.m);
}

var lastV = null, lastS = null, lastQuip = '';
var shownToasts = {}, toastTimer = null;

function fireToast(L) {
 var bucket = Math.min(L, 5);
 var pool = TOASTS[bucket]; if (!pool) return;
 var msg = pool[Math.floor(Math.random() * pool.length)];
 var el = document.getElementById('toast');
 if (!el) {
 el = document.createElement('div');
 el.id = 'toast'; el.className = 'toast';
 document.body.appendChild(el);
 }
 el.textContent = msg;
 void el.offsetWidth;
 el.classList.add('show');
 if (toastTimer) clearTimeout(toastTimer);
 toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

 var s = lastS || stats();
 var v = lastV || verdictOf(s.m, s.L);
 var quip = lastQuip || pickQuip(v.k, s);
 var inLine = {}; s.done.forEach(function(l){ LINES[l].forEach(function(i){ inLine[i] = true; }); });

 var board = '<div class="bingo-grid mini" style="margin-bottom:16px;">';
 for (var i = 0; i < 25; i++) {
 var cls = 'cell ro' + (on[i] ? ' on' : '') + (inLine[i] ? ' line' : '');
 board += '<div class="' + cls + '">' + CELLS[i] + '</div>';
 }
 board += '</div>';

 var tags = '';
 for (var j = 0; j < v.tags.length; j++) tags += '<span class="meta-tag">' + v.tags[j] + '</span>';

 app.innerHTML =

function drawCellText(ctx, text, cx, top, box) {
 var fs = 9, lines;
 var FONT = 'px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 while (fs >= 6) {
 ctx.font = fs + FONT;
 lines = wrapToLines(ctx, text, box - 8);
 if (lines.length * (fs + 2) <= box - 6) break;
 fs--;
 }
 ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
 var lh = fs + 2, total = lines.length * lh, y = top + box / 2 - total / 2 + lh / 2;
 for (var k = 0; k < lines.length; k++) { ctx.fillText(lines[k], cx, y); y += lh; }
 ctx.textBaseline = 'alphabetic';
}
function drawBoard(ctx, ox, oy, cell, gap, done) {
 var inLine = {}; done.forEach(function(l){ LINES[l].forEach(function(i){ inLine[i] = true; }); });
 for (var i = 0; i < 25; i++) {
 var r = Math.floor(i / 5), c = i % 5;
 var x = ox + c * (cell + gap), y = oy + r * (cell + gap);
 if (on[i]) {
 var grd = ctx.createLinearGradient(x, y, x + cell, y + cell);
 grd.addColorStop(0, '#f0c060'); grd.addColorStop(1, '#ffe1a0');
 ctx.fillStyle = grd;
 } else { ctx.fillStyle = 'rgba(255,255,255,.03)'; }
 roundRect(ctx, x, y, cell, cell, 8); ctx.fill();
 ctx.lineWidth = inLine[i] ? 2.5 : 1;
 ctx.strokeStyle = inLine[i] ? '#fff3cd' : (on[i] ? '#f0c060' : '#3a3045');
 roundRect(ctx, x, y, cell, cell, 8); ctx.stroke();
 ctx.fillStyle = on[i] ? '#2a2012' : 'rgba(224,216,236,.45)';
 drawCellText(ctx, CELLS[i], x + cell / 2, y, cell);
 }
}

async function buildPoster() {
 var s = lastS || stats(); var v = lastV || verdictOf(s.m, s.L);
 var W = POSTER_W, H = POSTER_H, pad = 40;
 var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
 var ctx = cv.getContext('2d');
 var FONT = '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif';

 ctx.fillStyle = '#1a1520'; ctx.fillRect(0, 0, W, H);
 var g = ctx.createLinearGradient(0, 0, W, H);
 g.addColorStop(0, 'rgba(176,159,255,.10)'); g.addColorStop(1, 'rgba(240,192,96,.06)');
 ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

 ctx.fillStyle = '#241e2a'; roundRect(ctx, pad, pad, W - pad*2, H - pad*2, 28); ctx.fill();
 var bar = ctx.createLinearGradient(pad, 0, W - pad, 0);
 bar.addColorStop(0, '#f0c060'); bar.addColorStop(.5, '#b89fff'); bar.addColorStop(1, '#f0c060');
 ctx.fillStyle = bar; roundRect(ctx, pad, pad, W - pad*2, 6, 3); ctx.fill();

 ctx.textAlign = 'center';
 ctx.fillStyle = '#f0c060'; ctx.font = '600 18px ' + FONT;
 ctx.fillText('霧 雨 魔 法 店 · 社会指数宾果', W/2, 96);

 ctx.fillStyle = (v.c.indexOf('green') > -1) ? '#6fcf97' : (v.c.indexOf('pink') > -1) ? '#f472b6' : (v.c.indexOf('purple') > -1) ? '#b89fff' : '#f0c060';
 ctx.font = '800 28px ' + FONT;
 ctx.fillText(v.t, W/2, 138);
 ctx.fillStyle = '#8a7e9a'; ctx.font = '14px ' + FONT;
 ctx.fillText('社会指数 ' + s.idx + '% · 点亮 ' + s.m + '/25 · 连线 ' + s.L + ' 条', W/2, 168);

 var cell = 76, gap = 5, gridW = cell*5 + gap*4;
 var ox = (W - gridW) / 2, oy = 196;
 drawBoard(ctx, ox, oy, cell, gap, s.done);

 var plain = lastQuip || pickQuip(v.k, s);
 ctx.fillStyle = '#e0d8ec'; ctx.font = '14px ' + FONT;
 ctx.textAlign = 'center';
 var dlines = wrapToLines(ctx, plain, W - pad*2 - 50).slice(0, 2);
 var dy = oy + gridW + 34;
 for (var i = 0; i < dlines.length; i++) ctx.fillText(dlines[i], W/2, dy + i*22);

 var siteImg = await loadImg(QR_IMG);
 var qqImg = await loadImg(QQ_IMG);
 var qs = 124, gap2 = 46, totalQW = qs*2 + gap2;
 var leftX = (W - totalQW) / 2, rightX = leftX + qs + gap2;
 var qy = H - pad - 196;
 drawQRBox(ctx, siteImg, leftX, qy, qs, '扫码开测', SITE_URL, '#f0c060');
 drawQRBox(ctx, qqImg, rightX, qy, qs, '加 QQ 群', '群号 ' + QQ_GROUP, '#b89fff');

 var pi = document.getElementById('posterImg');
 var pl = document.getElementById('posterLoading');
 var dl = document.getElementById('posterDl');
 var dataUrl = null;
 try { dataUrl = cv.toDataURL('image/png'); } catch (e) { dataUrl = null; }
 if (pl) pl.style.display = 'none';
 if (dataUrl) {
 if (pi) { pi.src = dataUrl; pi.style.display = 'block'; }
 if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; }
 } else {
 if (pi && pi.parentNode) { cv.className = 'poster-img'; cv.style.display = 'block'; pi.parentNode.replaceChild(cv, pi); }
 var hint = document.querySelector('.poster-hint');
 if (hint) hint.textContent = '当前环境无法导出图片。部署到 ' + SITE_URL + ' 线上访问即可正常保存。';
 }
}


render();
</script>
