var idx = -1, answers = [];

function render() {
  var d1=document.getElementById('ad1');
  if(d1)d1.style.display=idx===-1?'block':'none';
  var a = document.getElementById('app');
  if (idx === -1) {
    a.innerHTML = '<div class="intro"><div class="intro-badge">💘 霧雨魔法店 · 乙女鉴定</div><h1>测测你在《恋与深空》<br>的本命是谁</h1><p class="sub">' + QUESTIONS.length + ' 道深度问题 · 精准匹配你的深空恋人 · 抽到谁就是谁</p><div class="cover-hearts">💗💕💖💘💓</div><button class="btn btn-main" style="max-width:260px;margin:0 auto;" onclick="start()">开始测试 →</button><a href="index.html" class="home-link">← 返回魔法店</a></div>';
  } else if (idx < QUESTIONS.length) {
    var q = QUESTIONS[idx];
    var total = QUESTIONS.length;
    var barW = Math.round((idx+1)/total*100);
    var html = '<div class="progress-wrap"><div class="progress-text">问题 '+(idx+1)+' / '+total+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+barW+'%"></div></div></div>';
    html += '<div class="q-num">Q' + (idx+1) + '</div><div class="q-text">' + q.q + '</div><div class="options">';
    for (var i = 0; i < q.opts.length; i++) {
      html += '<button class="opt-btn" onclick="answer(' + i + ')"><span class="opt-letter">' + 'ABCD'[i] + '</span>' + q.opts[i].txt + '</button>';
    }
    html += '</div>';
    a.innerHTML = html;
  } else if (idx === QUESTIONS.length) {
    state = 'reveal'; calcAndReveal();
  } else if (state === 'reveal') {
    renderReveal(a);
  } else {
    showResult();
  }
}

var state = 'intro';

function start() { state = 'quiz'; idx = 0; answers = []; render(); }

function answer(optIdx) {
  answers.push(optIdx);
  idx++;
  if (idx === QUESTIONS.length) { state = 'reveal'; calcAndReveal(); }
  else render();
}

var revealedChar = null;

function calcAndReveal() {
  var scores = {}; KEYS.forEach(function(k){scores[k]=0;});
  for (var i = 0; i < answers.length; i++) {
    var sc = QUESTIONS[i].opts[answers[i]].scores;
    for (var k in sc) { if (scores[k]!==undefined) scores[k] += sc[k]; }
  }
  var best = KEYS[0];
  KEYS.forEach(function(k){ if (scores[k] > scores[best]) best = k; });
  revealedChar = CHARS[best];
  renderReveal(document.getElementById('app'));
}

function renderReveal(app) {
  var c = revealedChar;
  showReveal('你以为你在测「恋与深空」？', c.hero, c.color, '结果生成中…', function() {
    state = 'result';
    render();
  });
}

function showResult() {
  var c = revealedChar;
  var a = document.getElementById('app');
  var html = '<div class="result" style="background:rgba(239,68,68,.05);border-radius:18px;padding:20px 16px;border:2px solid rgba(239,68,68,.2);margin-bottom:14px;">';
  html += '<div class="result-emoji">' + c.emoji + '</div>';
  html += '<div class="result-label" style="color:#ef4444;font-size:18px;font-weight:900;letter-spacing:3px;">这里只有鬼子学院！只有鬼子！</div>';
  html += '<div class="result-name" style="color:' + c.color + ';">' + c.name + '</div>';
  html += '<div class="result-tagline" style="color:var(--muted);">英雄名：' + c.hero + '</div>';
  html += '<div class="result-desc" style="border-color:rgba(239,68,68,.2);">' + c.desc + '</div>';
  html += '<div class="result-meta">';
  c.tags.forEach(function(t){html += '<span class="meta-tag">' + t + '</span>';});
  html += '</div>';
  html += '<div class="result-dimensions">';
  DIM_META.forEach(function(d){
    var v = c.dims[d.k] || 0;
    html += '<div class="dim-item"><span class="dim-label">' + d.label + '</span><div class="dim-bar-wrap"><div class="dim-bar" style="width:' + v + '%;background:' + d.color + ';"></div></div><span class="dim-val">' + v + '</span></div>';
  });
  html += '</div></div>';
  html += '<button class="btn btn-main" onclick="shareIt()">📋 复制结果发给朋友</button>';
  html += '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>';
  html += '<a href="index.html" class="home-link">← 返回魔法店</a>';
  html += '<div class="qq-section"><img src="images/qq-group.jpg" alt="QQ群二维码" onerror="this.style.display=\'none\'"><p><strong style="color:var(--gold);">加群一起玩</strong><br>扫码进群，更多抽象好活</p></div>';
  a.innerHTML = html;
}

function shareIt() {
  var text = '😱我在《恋与深空》测出了蛆！你也来测测：' + window.location.href;
  copyToClipboard(text, '已复制！发给朋友钓鱼 🎣');
}

function restart() { state = 'intro'; idx = -1; answers = []; render(); }

render();
</script>
