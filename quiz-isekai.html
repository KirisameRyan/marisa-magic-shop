var KEYS = ['hero','sage','summoner','swordsaint','shadow','chef','overlord','neet','appraiser','necromancer','villager','smith'];

// ═══════════ 状态机 ═══════════
var state = 'intro', idx = 0, answers = [], lastResultKey = null;

function render() {
  var app = document.getElementById('app');
  if (state === 'intro') renderIntro(app);
  else if (state === 'quiz') renderQuestion(app);
  else if (state === 'loading') renderLoading(app);
  else if (state === 'result') renderResult(app);
}

function renderIntro(app) {
  app.innerHTML =
    '<div class="intro">'+
      '<div class="intro-badge">'+BADGE+'</div>'+
      '<h1>'+TITLE+'</h1>'+
      '<p class="sub">'+SUBTITLE.replace(/\n/g,'<br>')+'</p>'+
      '<button class="btn btn-main" style="max-width:260px;margin:0 auto;" onclick="startQuiz()">开始测试 →</button>'+
      '<a href="index.html" class="home-link">← 返回魔法店</a>'+
    '</div>';
}

function startQuiz() { state = 'quiz'; idx = 0; answers = []; render(); }

function renderQuestion(app) {
  if (idx >= QUESTIONS.length) { state = 'loading'; renderLoading(app); return; }
  var q = QUESTIONS[idx], total = QUESTIONS.length;
  var pct = Math.round((idx/total)*100);
  var html = '<div class="progress-wrap"><div class="progress-text">问题 '+(idx+1)+' / '+total+'</div><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
  html += '<div class="q-num">Q'+(idx+1)+'</div>';
  html += '<div class="q-text">'+q.q+'</div><div class="options">';
  for (var i=0;i<q.opts.length;i++) {
    html += '<button class="opt-btn" onclick="answer('+i+')"><span class="opt-letter">'+'ABCD'[i]+'</span>'+q.opts[i].txt+'</button>';
  }
  html += '</div>';
  app.innerHTML = html;
}

function answer(choice) { answers.push(choice); idx++; render(); }

async function renderLoading(app) {
  app.innerHTML = '<div class="loading-wrap"><div class="loading-orb"></div><p class="loading-text" id="ltxt">正在与异世界连接…</p></div>';
  await sleep(600);
  var lt = document.getElementById('ltxt'); if(lt) lt.textContent = '神明正在审核你的简历…';
  await sleep(600);
  lt = document.getElementById('ltxt'); if(lt) lt.textContent = '卡车君：这次选的人还不错…';
  await sleep(500);
  state = 'result';
  render();
}

function renderResult(app) {
  // 累加用户向量
  var uvec = [0,0,0,0,0,0];
  for (var i=0;i<answers.length;i++) {
    var w = QUESTIONS[i].opts[answers[i]].w;
    for (var d=0;d<6;d++) uvec[d] += w[d];
  }
  // 欧氏距离匹配
  var bestKey = KEYS[0], bestDist = Infinity;
  for (var k=0;k<KEYS.length;k++) {
    var v = RESULTS[KEYS[k]].v, dist = 0;
    for (var d=0;d<6;d++) dist += Math.pow(uvec[d]-v[d], 2);
    if (dist < bestDist) { bestDist = dist; bestKey = KEYS[k]; }
  }
  // 次匹配
  var runnerKey = null, runnerDist = Infinity;
  for (var k=0;k<KEYS.length;k++) {
    if (KEYS[k]===bestKey) continue;
    var v = RESULTS[KEYS[k]].v, dist = 0;
    for (var d=0;d<6;d++) dist += Math.pow(uvec[d]-v[d], 2);
    if (dist < runnerDist) { runnerDist = dist; runnerKey = KEYS[k]; }
  }
  var c = RESULTS[bestKey];
  lastResultKey = bestKey;
  var r = runnerKey ? RESULTS[runnerKey] : null;

  var html = '<div class="result">';
  html += '<div class="result-emoji">'+c.emoji+'</div>';
  html += '<div class="result-label">異世界職業診斷</div>';
  html += '<div class="result-name" style="color:'+c.color+';">'+c.name+'</div>';
  html += '<div class="result-tagline">'+c.tagline+'</div>';

  // 代表人物
  html += '<div style="font-size:12px;color:var(--muted);margin:4px 0;">代表：<b style="color:var(--text);">'+c.rep+'</b> &nbsp;'+c.anime+'</div>';

  // 维度条
  html += '<div class="result-dim">';
  for (var d=0;d<6;d++) {
    var pct = Math.min(100, Math.round(uvec[d]/1.2));
    html += '<div class="rd-item"><span class="rd-label">'+DIMS[d]+'</span><div class="rd-bar"><div class="rd-fill" style="width:'+pct+'%;background:'+DIM_COLORS[d]+';"></div></div><span class="rd-val">'+uvec[d]+'</span></div>';
  }
  html += '</div>';

  html += '<div class="result-desc">'+c.desc+'</div>';
  html += '<div class="result-meta">';
  c.tags.forEach(function(t){html += '<span class="meta-tag">'+t+'</span>';});
  html += '</div>';

  // 次匹配
  if (r) {
    html += '<div class="sub-match">⚡ 次匹配职业：<b>'+r.name+'</b>（代表：'+r.rep+'·'+r.anime+'）</div>';
  }

  html += '<button class="btn btn-main" onclick="shareIt()">📋 复制结果发给朋友</button>';
  html += '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>';
  html += '<a href="index.html" class="home-link">← 返回魔法店</a>';
  html += '<p class="notice">霧雨魔法店 · 转生有风险 · 选职业需谨慎</p>';
  html += '<div class="qq-section"><img src="images/qq-group.jpg" alt="QQ群二维码" onerror="this.style.display=\'none\'"><p><strong style="color:var(--gold);">加群一起玩</strong><br>扫码进群，更多抽象好活</p></div></div>';
  app.innerHTML = html;
}

function shareIt() { copyToClipboard('🚛 我被卡车撞到异世界了！转生职业是【'+RESULTS[lastResultKey].name+'】！你也来测测：'+window.location.href, '已复制！发给朋友一起转生 🚛'); }
function restart() { state = 'intro'; idx = 0; answers = []; render(); }

render();
</script>
</body>
</html>
