 .result-emoji { font-size: 92px; animation: popIn .6s cubic-bezier(.2,1.4,.4,1); }

}
.help-box .hl { font-size:18px; font-weight:800; color:var(--gold); letter-spacing:1px; }
.help-box .hl small { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:0; }
.help-box p { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.7; }

 .btn-back { display:inline-flex; align-items:center; gap:4px; background:transparent; border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit; transition:all .15s; margin-top:14px; }

 .loading-wheel { width:80px; height:80px; border-radius:50%; margin:0 auto 22px; background: conic-gradient(var(--gold),var(--purple),var(--pink),var(--green),var(--gold)); animation: spin .9s linear infinite; }

const MAXS = QUESTIONS.reduce((a,q)=>a+Math.max.apply(null,q.opts.map(o=>o.s)),0);

let quizIdx = -1;
let quizAnswers = [];

function render() {
  var a1=document.getElementById('ad1'),a2=document.getElementById('ad2'),a3=document.getElementById('ad3');
  if(a1)a1.style.display=quizIdx===-1?'block':'none';
  if(a2)a2.style.display=quizIdx>=0&&quizIdx<QUESTIONS.length?'block':'none';
  if(a3)a3.style.display=quizIdx>=QUESTIONS.length?'block':'none';
 const a = document.getElementById('app');
 if (quizIdx === -1) renderIntro(a);
 else if (quizIdx < QUESTIONS.length) renderQuiz(a);
}

function renderIntro(a) {
 const strip = FOODS.map(f => '<span class="food-mini">'+f+'</span>').join('');
 a.innerHTML =
 '<div class="intro">' +
 '<div class="intro-badge">霧雨魔法店 · 食疗占卜部</div>' +
 '<h1>🍽️ 对症下菜</h1>' +
 '<p class="sub">站在外卖软件前纠结了二十分钟？<br>答 '+QUESTIONS.length+' 个小问题，魔法店对症给你下一道菜。</p>' +
 '<div class="food-strip">'+strip+'</div>' +
 '<button class="btn btn-start" onclick="startQuiz()">🔮 开始占卜 →</button>' +
 '<a href="index.html" class="home-link">← 返回魔法店</a>' +
 '<p class="notice">结果由店里的老魔法决定 · 概不退换</p>' +
 '</div>';
}

function startQuiz() { quizIdx = 0; quizAnswers = []; render(); }

function renderQuiz(a) {
 const q = QUESTIONS[quizIdx];
 const denom = Math.max(1, QUESTIONS.length - 1);
 const pct = Math.round((quizIdx / denom) * 100);
 a.innerHTML =
 '<div class="progress-wrap">' +
 '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
 '<div class="progress-text">'+(quizIdx+1)+' / '+QUESTIONS.length+'</div>' +
 '</div>' +
 '<div class="q-num">第 '+(quizIdx+1)+' 问</div>' +
 '<div class="q-text">'+q.q+'</div>' +
 '<div class="options">' +
 q.opts.map((o,i) =>
 '<button class="opt-btn" onclick="quizAnswer('+i+')">' +
 '<span class="opt-letter">'+'ABCD'[i]+'</span>'+o.txt+'</button>'
 ).join('') +
 '</div>' +
 (quizIdx>0 ? '<div style="text-align:center;"><button class="btn-back" onclick="goBack()">← 上一题</button></div>' : '') +
 '<p class="notice" style="margin-top:16px;">你的每一个选择，魔法都看在眼里</p>';
}

function quizAnswer(i) {
 quizAnswers.push(QUESTIONS[quizIdx].opts[i]);
 quizIdx++;
 if (quizIdx < QUESTIONS.length) render();
 else showQuizLoading();
}
function goBack() { if (quizIdx <= 0) return; quizIdx--; quizAnswers.pop(); render(); }

async function showQuizLoading() {
 const a = document.getElementById('app');
 const steps = [
 '正在翻阅魔法菜谱…',
 '正在对照你的口味…',
 '正在摇晃水晶球…',
 '正在请教店主魔理沙…',
 '答案正在浮现…'
 ];
 a.innerHTML = '<div class="loading-wrap"><div class="loading-wheel"></div><p class="loading-text" id="ltxt">'+steps[0]+'</p></div>';
 const lt = document.getElementById('ltxt');
 for (var si = 0; si < steps.length; si++) { await sleep(550 + Math.random()*500); if (lt) lt.textContent = steps[si]; }
 await sleep(450);
 showResult();
}

function tierOf(score) {
 if (score <= 4) return 'sunny';
 const r = score / MAXS;
 if (r < 0.30) return 'melatonin';
 if (r < 0.60) return 'serotonin';
 return 'banquet';
}

function showResult() {
 const a = document.getElementById('app');
 const score = quizAnswers.reduce((t,o)=>t+(o.s||0), 0);
 const r = RESULTS[tierOf(score)];
 a.innerHTML =
 '<div class="result">' +
 '<div class="result-emoji">'+r.emoji+'</div>' +
 '<div class="result-name" style="color:'+r.color+'">'+r.name+'</div>' +
 '<div class="result-tagline">'+r.tagline+'</div>' +
 '<div class="result-desc">'+r.desc+'</div>' +
 '<div class="result-meta">'+r.tags.map(t=>'<span class="meta-tag">'+t+'</span>').join('')+'</div>' +
 '<button class="btn btn-main" onclick="shareIt()">📋 把这个测试发给朋友</button>' +
 '<button class="btn btn-ghost" onclick="restart()">🔄 再测一次</button>' +
 '<a href="index.html" class="home-link">← 返回魔法店</a>' +

 '<div class="qq-section">' +

  '</div>' +
  '<p style="font-size:11px;text-align:center;margin-top:8px;"><a href="https://space.bilibili.com/1029138222" target="_blank" style="color:var(--pink);text-decoration:none;">🅱 关注B站 · 霧雨魔法店</a></p>' +
  '</div>';

function shareIt() { copyToClipboard('我让魔法店帮我决定今天吃什么，结果有点出乎意料… 你也来测测：' + window.location.href, '已复制！发给朋友试试 🍽️'); }

function restart() { quizIdx = -1; quizAnswers = []; render(); }

render();
