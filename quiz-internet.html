<html lang="zh-CN">
<head>
<script src="js/analytics.js"></script>
<link rel="stylesheet" href="css/common.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测一测你是哪位抽象圈大手子 · 2.0 · 霧雨魔法店</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1520'/><text x='16' y='25' text-anchor='middle' font-size='24' fill='%23f0c060'>✦</text></svg>">
<style>
:root {
 --accent:#f0a060; --accent-soft:rgba(240,160,96,.06);
}
.container::before {
 background:linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
}

/* ── 开始页 ── */
.start { text-align:center; }
.badge-line {
 display:inline-block; font-size:11px; letter-spacing:3px; color:var(--accent);
 border:1px solid var(--accent); border-radius:20px; padding:4px 14px; margin-bottom:14px;
}
.start h1 { font-size:26px; margin-bottom:8px; line-height:1.35; }
.start .sub { font-size:14px; color:var(--muted); margin-bottom:22px; }
.avatar-strip { display:flex; justify-content:center; gap:4px; flex-wrap:wrap; margin-bottom:26px; }
.mini {
 width:40px; height:40px; border-radius:11px; overflow:hidden;
 border:2px solid var(--border); background:rgba(255,255,255,.03);
 transition:transform .2s;
}
.mini:hover { transform:translateY(-4px) rotate(-4deg); }
.mini svg,.mini img { width:100%; height:100%; display:block; object-fit:cover; }
.mystery {
 display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800;
 color:var(--muted);
 background:repeating-linear-gradient(45deg,var(--border),var(--border) 4px,transparent 4px,transparent 8px);
}

/* ── 答题页 ── */
.q-num { color:var(--accent); font-size:13px; font-weight:700; letter-spacing:1px; }
.q-text { font-size:20px; font-weight:700; }
.opt-btn:hover { border-color:var(--accent); background:var(--accent-soft); }
.opt-btn:hover .opt-letter { background:var(--accent); color:#3d1e06; }
.btn-back {
 display:inline-flex; align-items:center; gap:4px; background:transparent;
 border:1px solid var(--border); border-radius:10px; padding:10px 18px;
 font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit;
 transition:all .15s; margin-top:14px;
}
.btn-back:hover { border-color:var(--gold); color:var(--gold); }

/* ── 加载 ── */
.loading-wrap { text-align:center; padding:44px 0; }
.loading-avatar {
 width:84px; height:84px; border-radius:22px; margin:0 auto 20px;
 background:linear-gradient(135deg, var(--accent), var(--gold));
 display:flex; align-items:center; justify-content:center; font-size:38px;
 animation:pulse 1.1s infinite;
}
@keyframes pulse { 0%,100% { transform:scale(1) rotate(0); } 50% { transform:scale(1.1) rotate(3deg); } }
.loading-text { font-size:14px; color:var(--muted); }

/* ── 结果页 ── */
.result { position:relative; }
.result-hero {
 width:130px; height:130px; border-radius:30px; margin:0 auto 14px; overflow:hidden;
 animation:popInHero .55s cubic-bezier(.2,1.4,.4,1);
 box-shadow:0 14px 36px rgba(0,0,0,.4); border:4px solid var(--border);
}
.result-hero svg,.result-hero img { width:100%; height:100%; display:block; object-fit:cover; }
@keyframes popInHero {
 0% { transform:scale(0) rotate(-12deg); }
 60% { transform:scale(1.12); }
 100% { transform:scale(1); }
}
.result-label { font-size:12px; }
.result-name { font-size:32px; font-weight:900; }
.result-aka { font-size:13px; color:var(--muted); margin-bottom:16px; }
.quote-bubble {
 display:inline-block; background:rgba(255,255,255,.08); color:var(--text);
 font-size:14px; padding:10px 18px; border-radius:18px 18px 18px 4px;
 margin-bottom:22px; line-height:1.5; border:1px solid var(--border);
}
.dims { display:flex; flex-direction:column; gap:10px; text-align:left; margin-bottom:22px; }
.dim-item { display:flex; align-items:center; gap:12px; }
.dim-label { width:72px; font-size:13px; color:var(--muted); flex-shrink:0; text-align:right; }
.dim-bar-wrap { flex:1; height:9px; background:var(--border); border-radius:5px; overflow:hidden; }
.dim-bar { height:100%; border-radius:5px; width:0; transition:width .9s cubic-bezier(.3,1,.4,1); }
.dim-val { font-size:12px; color:var(--muted); width:30px; text-align:right; }
.result-desc {
 text-align:left; padding:20px; font-size:14px; line-height:1.9; margin-bottom:18px;
}
.ru-face {
 width:26px; height:26px; border-radius:8px; overflow:hidden;
 display:inline-block; vertical-align:middle; border:1px solid var(--border);
}
.ru-face svg,.ru-face img { width:100%; height:100%; display:block; }
.runner-up {
 margin-top:14px; padding-top:12px; border-top:1px solid var(--border);
 font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}

/* ── 隐藏特效 ── */
.secret .result-hero { border-color:var(--gold); box-shadow:0 0 0 4px rgba(240,192,96,.3),0 14px 36px rgba(240,192,96,.2); }
.secret-badge {
 display:inline-block; background:linear-gradient(90deg, var(--gold), #ffe8b0); color:#5a430a;
 font-size:12px; font-weight:800; letter-spacing:2px; padding:5px 16px; border-radius:20px;
 margin-bottom:10px; animation:shine 1.6s ease infinite alternate;
}
@keyframes shine { from { filter:brightness(1); } to { filter:brightness(1.18); } }
.confetti {
 position:absolute; top:-10px; font-size:18px; animation:fall 2.6s linear infinite; pointer-events:none;
}
@keyframes fall {
 0% { transform:translateY(-20px) rotate(0); opacity:1; }
 100% { transform:translateY(440px) rotate(540deg); opacity:0; }
}

/* ── 按钮覆盖 ── */
.btn-main { background:var(--accent); color:#3d1e06; }
.btn-main:hover { background:#f0b878; }
.btn-ghost:hover { border-color:var(--accent); }
.notice { font-size:11px; line-height:1.8; }
.result-meta { gap:8px; margin-bottom:20px; }
.meta-tag { font-size:11px; padding:5px 12px; }

@media (prefers-reduced-motion:reduce) { *,.result-hero,.confetti,.loading-avatar { animation:none!important; transition:none!important; } }
@media (max-width:420px) { .container { padding:26px 18px; } .q-text { font-size:18px; } }
</style>

function svgToImage(svg){
 return new Promise(function(res){
 var blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
 var url=URL.createObjectURL(blob);var img=new Image();
 img.onload=function(){res(img);URL.revokeObjectURL(url);};
 img.onerror=function(){res(null);};
 img.src=url;
 });
}
