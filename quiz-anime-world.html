  ]},

  {q:'最想拥有哪种不太实用的能力？',opts:[

var LOADING_STEPS = ['正在扫描灵魂波长…','检索二次元数据库…','分析人格坐标…','匹配世界线…','锁定灵魂归属…'];

var QQ_IMG = 'images/qq-group.png';
var SITE_URL = 'www.azureflame.cloud';

// ==================== 渲染 ====================

function render() {
  toggleAds(state);
  var app = document.getElementById('app');
  if (state === 'intro')  renderIntro(app);
  else if (state === 'quiz') renderQuestion(app);
  else if (state === 'loading') renderLoading(app);
  else if (state === 'result') renderResult(app);
  else if (state === 'poster') renderPoster(app);
}

function renderIntro(app) {
  app.innerHTML =
    '<div class="intro">' +
      '<div class="intro-badge">' + BADGE_TEXT + '</div>' +
      '<h1>' + QUIZ_TITLE + '</h1>' +
      '<p class="sub">' + QUIZ_SUBTITLE + '</p>' +

    '</div>';
}

function startQuiz() { state = 'quiz'; idx = 0; answers = []; render(); }

function renderQuestion(app) {
  if (idx >= QUESTIONS.length) { state = 'loading'; render(); return; }
  var q = QUESTIONS[idx];
  var pct = Math.round((idx / QUESTIONS.length) * 100);
  var labels = 'ABCDEFGH';
  var html =
    '<div class="progress-wrap">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-text">' + (idx + 1) + ' / ' + QUESTIONS.length + '</div>' +
    '</div>' +
    '<div class="q-num">第 ' + (idx + 1) + ' 问</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="options">';
  for (var i = 0; i < q.opts.length; i++) {
    html +=
      '<button class="opt-btn" onclick="answer(' + i + ')">' +
        '<span class="opt-letter">' + (labels[i] || '?') + '</span>' +
        q.opts[i].txt +
      '</button>';
  }
  html += '</div>';
  if (idx > 0) html += '<div style="text-align:center;"><button class="btn-back" onclick="goBack()">← 上一题</button></div>';
  app.innerHTML = html;
}

function answer(choice) { answers.push(QUESTIONS[idx].opts[choice]); idx++; render(); }
function goBack() { if (idx <= 0) return; idx--; answers.pop(); render(); }

function renderLoading(app) {
  app.innerHTML =
    '<div class="loading-wrap">' +
      '<div class="loading-orb"></div>' +
      '<p class="loading-text" id="ltxt">' + LOADING_STEPS[0] + '</p>' +
    '</div>';
  cycleLoading(1);
}

async function cycleLoading(i) {
  if (i >= LOADING_STEPS.length) { state = 'result'; render(); return; }
  await sleep(500 + Math.random() * 400);
  var lt = document.getElementById('ltxt');
  if (lt) lt.textContent = LOADING_STEPS[i];
  cycleLoading(i + 1);
}

function calcResult() {
  var uv = [0,0,0,0,0,0];
  for (var i = 0; i < answers.length; i++) {
    var v = answers[i].v;
    for (var d = 0; d < 6; d++) uv[d] += v[d];
  }
  var scores = {};
  for (var j = 0; j < REGION_KEYS.length; j++) {
    var key = REGION_KEYS[j];
    var rv = REGIONS[key].vec;
    var dot = 0, na = 0, nb = 0;
    for (var d = 0; d < 6; d++) { dot += uv[d] * rv[d]; na += uv[d] * uv[d]; nb += rv[d] * rv[d]; }
    scores[key] = (na === 0 || nb === 0) ? 0 : dot / (Math.sqrt(na) * Math.sqrt(nb));
  }
  var ranked = REGION_KEYS.slice().sort(function(x,y){return scores[y]-scores[x];});
  return { key:ranked[0], runners:ranked.slice(1,4), vec:uv, scores:scores };
}

function buildRadar(uv, color) {
  var n = 6, cx = 140, cy = 124, R = 80, LB = 20;
  var minv = Math.min.apply(null, uv);
  var shifted = uv.slice();
  if (minv <= 0) { var offset = Math.abs(minv) + 1; for (var i = 0; i < shifted.length; i++) shifted[i] += offset; }
  var maxv = Math.max.apply(null, shifted.concat([1]));
  function pt(i, r) { var ang = -Math.PI/2 + i*2*Math.PI/n; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)]; }
  var svg = '<svg viewBox="0 0 280 252" xmlns="http://www.w3.org/2000/svg">';
  var rings = [0.25,0.5,0.75,1];
  for (var g = 0; g < rings.length; g++) {
    var rp = [];
    for (var i = 0; i < n; i++) { var p = pt(i, R*rings[g]); rp.push(p[0].toFixed(1)+','+p[1].toFixed(1)); }
    svg += '<polygon points="'+rp.join(' ')+'" fill="none" stroke="var(--border)" stroke-width="1" opacity="'+(g===rings.length-1?0.9:0.45)+'"/>';
  }
  for (var i = 0; i < n; i++) {
    var e = pt(i, R);
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+e[0].toFixed(1)+'" y2="'+e[1].toFixed(1)+'" stroke="var(--border)" stroke-width="1" opacity="0.45"/>';
    var lp = pt(i, R+LB), anc = Math.abs(lp[0]-cx)<8?'middle':(lp[0]>cx?'start':'end');
    svg += '<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]-1).toFixed(1)+'" fill="var(--muted)" font-size="9" text-anchor="'+anc+'">'+DIM_LABEL[DIMS[i]]+'</text>';
    svg += '<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+10).toFixed(1)+'" fill="'+color+'" font-size="10" font-weight="700" text-anchor="'+anc+'">'+Math.round(uv[i])+'</text>';
  }
  var dp = [];
  for (var i = 0; i < n; i++) { var p = pt(i, (shifted[i]/maxv)*R); dp.push(p[0].toFixed(1)+','+p[1].toFixed(1)); }
  svg += '<polygon points="'+dp.join(' ')+'" fill="'+color+'" fill-opacity="0.2" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>';
  for (var i = 0; i < n; i++) { var p = pt(i, (shifted[i]/maxv)*R); svg += '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+color+'"/>'; }
  return svg + '</svg>';
}

function renderResult(app) {
  var r = calcResult();
  var reg = REGIONS[r.key];
  var html =
    '<div class="result">' +
      '<div class="result-hero" style="background:linear-gradient(135deg,'+reg.color+'33,'+reg.color+'11);">'+reg.emoji+'</div>' +
      '<div class="result-label">霧雨魔法店 · 灵魂故乡鉴定</div>' +

      '<div class="result-tagline">'+reg.aka+'</div>' +
      '<div class="result-quote">'+reg.q+'</div>' +
      '<div class="dim-wrap">'+buildRadar(r.vec, reg.color)+'</div>' +
      '<div class="result-desc">'+reg.desc+'</div>' +
      '<div class="result-meta">';
  for (var i = 0; i < reg.tags.length; i++) html += '<span class="meta-tag">'+reg.tags[i]+'</span>';
  html += '</div>';
  if (r.runners.length) {
    html += '<div class="runner-up">你的灵魂还混有：';
    for (var i = 0; i < r.runners.length; i++) {
      html += '<span class="runner-item" style="border-color:'+REGIONS[r.runners[i]].color+'">'+REGIONS[r.runners[i]].emoji+' '+REGIONS[r.runners[i]].name+'</span>';
    }
    html += '</div>';
  }
  html +=
      '<button class="btn btn-main" onclick="shareIt(\''+r.key+'\')">📋 复制结果发给朋友</button>' +

      '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>' +
      '<a href="index.html" class="home-link">← 返回魔法店</a>' +
      '<p class="notice">霧雨魔法店 · 二次元灵魂研究所 · 结果仅供娱乐</p>' +
      '<div class="qq-section">' +
        '<img src="images/qq-group.jpg" alt="QQ群二维码" onerror="this.style.display=\'none\'">' +
        '<p><strong style="color:var(--gold);">加群一起玩</strong><br>群号 702973928 · 更多抽象好活</p>' +
      '</div>' +
      '<p style="font-size:11px;text-align:center;margin-top:8px;"><a href="https://space.bilibili.com/1029138222" target="_blank" style="color:var(--pink);text-decoration:none;">🅱 关注B站 · 霧雨魔法店</a></p>' +
    '</div>';
  app.innerHTML = html;
}

function shareIt(key) {

function renderPoster(app) {

      '<p class="poster-hint">手机长按上图即可保存到相册；电脑可点下方按钮下载。</p>' +
      '<a class="btn btn-main" id="posterDl" download="灵魂故乡.png" style="display:none;">⬇️ 下载海报</a>' +
      '<button class="btn btn-ghost" onclick="state=\'result\';render();">← 返回结果</button>' +
    '</div>';
  buildPoster();
}

async function buildPoster() {
  var r = calcResult();
  var reg = REGIONS[r.key];
  var W = 640, H = 920, pad = 36;
  var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');
  var FONT = "-apple-system,PingFang SC,Microsoft YaHei,sans-serif";

  ctx.fillStyle = '#1a1520'; ctx.fillRect(0, 0, W, H);
  var g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, 'rgba(176,159,255,.10)'); g.addColorStop(1, 'rgba(240,192,96,.06)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#241e2a'; roundRect(ctx, pad, pad, W - pad*2, H - pad*2, 28); ctx.fill();
  var bar = ctx.createLinearGradient(pad, 0, W - pad, 0);
  bar.addColorStop(0, '#f0c060'); bar.addColorStop(.5, '#b89fff'); bar.addColorStop(1, '#f0c060');
  ctx.fillStyle = bar; roundRect(ctx, pad, pad, W - pad*2, 6, 3); ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#b89fff'; ctx.font = '600 16px ' + FONT;
  ctx.fillText('霧雨魔法店 · 灵魂故乡鉴定', W/2, 80);

  var cx = W/2, cy = 170, R = 82;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.closePath(); ctx.clip();
  ctx.fillStyle = '#1a1520'; ctx.fillRect(cx-R, cy-R, R*2, R*2);
  ctx.fillStyle = '#fff'; ctx.font = '86px sans-serif'; ctx.textBaseline = 'middle';
  ctx.fillText(reg.emoji, cx, cy + 6); ctx.textBaseline = 'alphabetic';
  ctx.restore();
  ctx.lineWidth = 5; ctx.strokeStyle = reg.color;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle = reg.color; ctx.font = '800 40px ' + FONT;
  ctx.fillText(reg.name, W/2, 290);
  ctx.fillStyle = '#8a7e9a'; ctx.font = '16px ' + FONT;
  ctx.fillText(reg.aka, W/2, 320);
  ctx.fillStyle = '#f0c060'; ctx.font = '14px ' + FONT;
  var plain = reg.q.replace(/「/g,'').replace(/」/g,'');
  wrapText(ctx, plain, W/2, 352, W - pad*2 - 50, 24);

  var ty = 410;
  ctx.fillStyle = '#e0d8ec'; ctx.font = '14px ' + FONT;
  var dlines = wrapToLines(ctx, reg.desc.replace(/<br\s*\/?>/gi,'\n').split('\n')[0], W - pad*2 - 50);
  for (var i = 0; i < Math.min(dlines.length, 2); i++) ctx.fillText(dlines[i], W/2, ty + i*22);

  var tx = pad + 20, tty = ty + 60;
  for (var i = 0; i < reg.tags.length; i++) {
    var tw = ctx.measureText(reg.tags[i]).width + 28;
    if (tx + tw > W - pad - 20) { tx = pad + 20; tty += 36; }
    ctx.fillStyle = 'rgba(255,255,255,.04)'; ctx.strokeStyle = reg.color+'55';
    roundRect(ctx, tx, tty-18, tw, 32, 16); ctx.fill(); ctx.stroke();
    ctx.fillStyle = reg.color; ctx.fillText(reg.tags[i], tx + tw/2, tty);
    tx += tw + 10;
  }

  var siteImg = await loadImg(QR_IMG);
  var qqImg = await loadImg(QQ_IMG);
  var qs = 124, gap2 = 46, totalQW = qs*2 + gap2;
  var leftX = (W - totalQW)/2, rightX = leftX + qs + gap2;
  var qy = H - pad - 196;
  drawQRBox(ctx, siteImg, leftX, qy, qs, '扫码开测', SITE_URL, '#f0c060');
  drawQRBox(ctx, qqImg, rightX, qy, qs, '加 QQ 群', '群号 '+QQ_GROUP, '#b89fff');

  ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT;
  ctx.textAlign = 'center'; ctx.fillText('B站: bilibili.com/1029138222', W/2, qy+qs+62);

  var pi = document.getElementById('posterImg');
  var pl = document.getElementById('posterLoading');
  var dl = document.getElementById('posterDl');
  var dataUrl = null;
  try { dataUrl = cv.toDataURL('image/png'); } catch(e){}
  if (pl) pl.style.display = 'none';
  if (dataUrl) {
    if (pi) { pi.src = dataUrl; pi.style.display = 'block'; }
    if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; }
  } else {
    if (pi && pi.parentNode) { cv.className = 'poster-img'; cv.style.display = 'block'; pi.parentNode.replaceChild(cv, pi); }
    var hint = document.querySelector('.poster-hint');
    if (hint) hint.textContent = '当前环境无法导出图片。部署到线上访问即可正常保存。';
  }
}

function restart() { state = 'intro'; idx = 0; answers = []; render(); }

render();
