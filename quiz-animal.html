<script>

let mode = null, questions = [], idx = -1, answers = [];

function render() {
  var a1=document.getElementById('ad1'),a2=document.getElementById('ad2'),a3=document.getElementById('ad3');

  if(a3)a3.style.display=mode!==null&&idx>=questions.length?'block':'none';

 if (mode === null) {

 <button class="ver-card" onclick="pick('pro')"><div class="icon">🔬</div><div class="title">专业版</div><div class="info">${proQs.length} 道题 · 更全面一点</div></button>

 } else { showLoading(); }
}

function pick(m) { mode = m; questions = m === 'quick' ? quickQs : proQs; idx = 0; answers = []; render(); }
function answer(i) { answers.push(i); idx++; render(); }
function goBack() { if(idx<=0) return; idx--; answers.pop(); render(); }

async function showLoading() {
 const a = document.getElementById('app');
 const animals = ['🐱','🐶','🐰','🦊','🐼','🐨','🐸','🐙'];
 a.innerHTML = '<div class="loading-wrap"><div class="loading-animal" id="lanim">🐱</div><p class="loading-text">正在分析你的灵魂…</p></div>';
 const lanim = document.getElementById('lanim');
 for (let i = 0; i < 12; i++) { await sleep(150+Math.random()*200); lanim.textContent = animals[i%animals.length]; }
 await sleep(300); showResult();
}
