var ID_KEYS = ['leziren','lao','jianpan','wenyi','dilei','yabi','jianzheng','esu','fur','geng','zuoti','nan','tomboy','meng'];
var LOADING_STEPS = ['正在扫描你的上网记录…','分析社交平台行为模式…','提取评论区和群聊数据…','排查点赞收藏和深夜动态…','计算 7 大行为维度…','比对 14 种互联网身份…','身份已锁定…'];

function render() {
 var a=document.getElementById('app');
 if(state==='intro') renderIntro(a);
 else if(state==='quiz') renderQuestion(a);
 else if(state==='loading') renderLoading(a);
 else renderResult(a);
}

function renderIntro(a) {
 a.innerHTML=
 '<div class="intro">'+
 '<div class="intro-badge">霧雨魔法店 · 身份鉴定</div>'+
 '<h1>测测你的<br>互联网身份</h1>'+
 '<p class="sub">'+QUESTIONS.length+' 道题 · 7 大行为维度 · '+ID_KEYS.length+' 种身份<br>乐子人？地雷女？键政蛆？你在互联网上到底是哪个物种？</p>'+
 '<div style="display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-bottom:24px;">'+
 ID_KEYS.map(function(k){return '<span style="font-size:24px;opacity:.4;cursor:default;" title="'+IDENTITIES[k].name+'">'+IDENTITIES[k].emoji+'</span>';}).join('')+
 '</div>'+
 '<button class="btn btn-main" style="max-width:260px;margin:0 auto;" onclick="startQuiz()">开始测试 →</button>'+
 '<a href="index.html" class="home-link">← 返回魔法店</a>'+
 '</div>';
}

function startQuiz() { state='quiz'; idx=0; answers=[]; render(); }

function renderQuestion(a) {
 if(idx>=QUESTIONS.length) { state='loading'; render(); return; }
 var q=QUESTIONS[idx],pct=Math.round((idx/QUESTIONS.length)*100),labels='ABCDEFGH';
 var h=
 '<div class="progress-wrap">'+
 '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
 '<div class="progress-text">'+(idx+1)+' / '+QUESTIONS.length+'</div>'+
 '</div>'+
 '<div class="q-num">第 '+(idx+1)+' 问</div>'+
 '<div class="q-text">'+q.q+'</div>'+
 '<div class="options">';
 for(var i=0;i<q.opts.length;i++) {
 h+='<button class="opt-btn" onclick="answer('+i+')"><span class="opt-letter">'+(labels[i]||'?')+'</span>'+q.opts[i].txt+'</button>';
 }
 h+='</div>';
 if(idx>0) h+='<div style="text-align:center;"><button class="btn-back" onclick="goBack()">← 上一题</button></div>';
 a.innerHTML=h;
}

function answer(c) { answers.push(QUESTIONS[idx].opts[c]); idx++; render(); }
function goBack() { if(idx<=0) return; idx--; answers.pop(); render(); }

function renderLoading(a) {
 a.innerHTML='<div class="loading-wrap"><div class="loading-pulse"></div><p class="loading-text" id="ltxt">'+LOADING_STEPS[0]+'</p></div>';
 cycleLoading(1);
}
async function cycleLoading(i) {
 if(i>=LOADING_STEPS.length) { state='result'; render(); return; }
 await sleep(450+Math.random()*350);
 var lt=document.getElementById('ltxt'); if(lt) lt.textContent=LOADING_STEPS[i];
 cycleLoading(i+1);
}

/* 累加所有答案的维度分 */
function tallyDims() {
 var d={atk:0,fun:0,cry:0,img:0,sub:0,nerd:0,moe:0,snr:0,gFem:0,gTom:0};
 for(var i=0;i<answers.length;i++) {
 var sc=answers[i].d||{};
 for(var k in sc) d[k]=(d[k]||0)+sc[k];
 }
 return d;
}

function cosine(a,b) {
 var dot=0,na=0,nb=0;
 for(var i=0;i<a.length;i++){ dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
 if(na===0||nb===0) return 0;
 return dot/(Math.sqrt(na)*Math.sqrt(nb));
}

function calcResult() {
 var d=tallyDims();
 var uv=DIMS.map(function(k){return d[k];});
 var scores={};
 for(var i=0;i<ID_KEYS.length;i++) {
 var key=ID_KEYS[i];
 var base=cosine(uv,IDVEC[key])*100;
 var bonus=0;
 if(MARKER[key]) bonus=MARKER_W*Math.max(0,(d[MARKER[key]]||0)-3);
 scores[key]=base+bonus;
 }
 var ranked=ID_KEYS.slice().sort(function(x,y){return scores[y]-scores[x];});
 return { key:ranked[0], runners:ranked.slice(1,4), dims:d, uv:uv };
}

function buildRadar(uv, color) {
 var n=DIMS.length, cx=140, cy=124, R=80, LB=18;
 var maxv=Math.max.apply(null, uv.concat([1]));
 function pt(i,r){ var ang=-Math.PI/2 + i*2*Math.PI/n; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)]; }
 var svg='<svg class="radar" viewBox="0 0 280 252" xmlns="http://www.w3.org/2000/svg">';
 /* 蛛网网格 */
 var rings=[0.25,0.5,0.75,1];
 for(var g=0;g<rings.length;g++){
 var rp=[];
 for(var i=0;i<n;i++){ var p=pt(i,R*rings[g]); rp.push(p[0].toFixed(1)+','+p[1].toFixed(1)); }
 svg+='<polygon points="'+rp.join(' ')+'" fill="none" stroke="var(--border)" stroke-width="1" opacity="'+(g===rings.length-1?0.9:0.45)+'"/>';
 }
 /* 放射轴 + 标签 + 数值 */
 for(var i=0;i<n;i++){
 var e=pt(i,R);
 svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+e[0].toFixed(1)+'" y2="'+e[1].toFixed(1)+'" stroke="var(--border)" stroke-width="1" opacity="0.45"/>';
 var lp=pt(i,R+LB), anc=Math.abs(lp[0]-cx)<8?'middle':(lp[0]>cx?'start':'end');
 svg+='<text class="radar-label" x="'+lp[0].toFixed(1)+'" y="'+(lp[1]-1).toFixed(1)+'" fill="var(--muted)" text-anchor="'+anc+'">'+DIM_LABEL[DIMS[i]]+'</text>';
 svg+='<text class="radar-num" x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+9).toFixed(1)+'" fill="'+color+'" text-anchor="'+anc+'">'+uv[i]+'</text>';
 }
 /* 数据多边形 */
 var dp=[];
 for(var i=0;i<n;i++){ var p=pt(i,(uv[i]/maxv)*R); dp.push(p[0].toFixed(1)+','+p[1].toFixed(1)); }
 svg+='<polygon class="radar-poly" points="'+dp.join(' ')+'" fill="'+color+'" fill-opacity="0.25" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>';
 for(var i=0;i<n;i++){ var p=pt(i,(uv[i]/maxv)*R); svg+='<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="2.6" fill="'+color+'"/>'; }
 return svg+'</svg>';
}

function renderResult(a) {
 var r=calcResult(),id=IDENTITIES[r.key];
 var h=
 '<div class="result">'+
 '<div class="result-emoji">'+id.emoji+'</div>'+
 '<div class="result-label">互联网身份鉴定结果</div>'+
 '<div class="result-name" style="color:'+id.color+'">'+id.name+'</div>'+
 '<div class="result-tagline">'+id.tagline+'</div>'+
 '<div class="result-desc">'+id.desc+'</div>'+
 '<div class="result-meta">';
 for(var i=0;i<id.tags.length;i++) { h+='<span class="meta-tag">'+id.tags[i]+'</span>'; }
 h+='</div>';
 h+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-align:left;">你的行为维度画像：</div>';
 h+='<div class="dim-wrap">'+buildRadar(r.uv, id.color)+'</div>';
 if(r.runners.length) {
 h+='<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">你的互联网成分中还混有：</div>';
 h+='<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;">';
 for(var i=0;i<r.runners.length;i++) {
 h+='<span class="identity-badge" style="border-color:'+IDENTITIES[r.runners[i]].color+'">'+IDENTITIES[r.runners[i]].emoji+' '+IDENTITIES[r.runners[i]].name+'</span>';
 }
 h+='</div>';
 }
 h+=
 '<button class="btn btn-main" onclick="shareIt(\''+r.key+'\')">📋 复制结果发给朋友</button>'+
 '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>'+
 '<a href="index.html" class="home-link">← 返回魔法店</a>'+
 '<p class="notice">霧雨魔法店 · 互联网人类学部 · 结果仅供娱乐</p>'+
'<div class="qq-section">'+
'<img src="images/qq-group.jpg" alt="QQ群二维码">'+
'<p><strong style="color:var(--gold);">加群一起玩</strong><br>扫码进群，更多抽象好活</p>'+
'</div>'+
'<p style="font-size:11px;text-align:center;margin-top:8px;"><a href="https://space.bilibili.com/1029138222" target="_blank" style="color:var(--pink);text-decoration:none;">🅱 关注B站 · 霧雨魔法店</a></p>'+
'</div>';
 a.innerHTML=h;
}

function shareIt(key) {
 var id=IDENTITIES[key];
 var text='我在霧雨魔法店测出来是【'+id.emoji+' '+id.name+'】——「'+id.tagline+'」你也来测测：'+window.location.href;
 copyToClipboard(text, '已复制！发给朋友试试 😈');
}

function restart() { state='intro'; idx=0; answers=[]; render(); }

render();
</script>
