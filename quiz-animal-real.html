 if (idx === -1) {
 const strip = Object.values(ANIMALS).map(x=>`<div class="mini" title="${x.name}">${x.emoji}</div>`).join('');
 a.innerHTML = `<div class="intro"><div class="intro-badge">霧雨魔法店 · 灵魂鉴定 · 真实版</div><h1>🐾 测一测你的灵魂动物</h1><p class="sub">${QUESTIONS.length} 道题 · 12 种动物 · 这次是真的不一样的</p><div class="animal-strip">${strip}</div><p style="font-size:12px;color:var(--muted);margin-bottom:16px;">认真回答，找到与你灵魂最契合的伙伴<br>每个选项都会影响结果——这次不开玩笑</p><button class="btn btn-start" onclick="start()">🐾 开始测试</button><a href="index.html" class="home-link">← 返回魔法店</a><p class="notice">如果测出来是蛆……就当是老版本的彩蛋吧</p></div>`;
 } else if (idx < QUESTIONS.length) {
 const q = QUESTIONS[idx]; const pct = Math.round((idx/QUESTIONS.length)*100);
 a.innerHTML = `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-text">${idx+1} / ${QUESTIONS.length}</div></div><div class="q-num">第 ${idx+1} 题</div><div class="q-text">${q.q}</div><div class="options">${q.opts.map((o,i)=>`<button class="opt-btn" onclick="answer(${i})"><span class="opt-letter">${'ABCD'[i]}</span>${o.txt}</button>`).join('')}</div>${idx>0?'<div style="text-align:center;"><button class="btn-back" onclick="goBack()">← 上一题</button></div>':''}`;
 } else { showLoading(); }
}

function start() { idx = 0; answers = []; render(); }
function answer(i) { answers.push(QUESTIONS[idx].opts[i]); idx++; render(); }
function goBack() { if(idx<=0) return; idx--; answers.pop(); render(); }

async function showLoading() {
 const a = document.getElementById('app');
 const animals = ['🐱','🐶','🦊','🐺','🦉','🐼','🦁','🦌','🦅','🐬','🦥','🐙'];
 a.innerHTML = '<div class="loading-wrap"><div class="loading-animal" id="lanim">🐱</div><p class="loading-text">正在扫描灵魂波动…</p></div>';
 const lanim = document.getElementById('lanim');
 for (let i = 0; i < 16; i++) { await sleep(120+Math.random()*180); lanim.textContent = animals[i%animals.length]; }
 await sleep(300); showResult();
}

function calcResult() {
 // 1% chance of easter egg: maggot
 if (Math.random() < 0.01) return { key:'maggot', easter:true };

 // 1) 把每道题的答案累加成一个五维性格向量
 const axisKeys = AXES.map(a=>a.key);
 const vec = {}; for (const k of axisKeys) vec[k] = 0;
 for (const opt of answers) {
 for (const [k, v] of Object.entries(opt.d || {})) {
 if (k in vec) vec[k] += v;
 }
 }
 const u = axisKeys.map(k=>vec[k]); // 用户向量
 const uMag = Math.hypot(...u);

 // 2) 用余弦相似度，和每个动物的画像比方向（而不是比谁攒分多）
 const keys = Object.keys(PROFILES);
 const sims = {};
 for (const k of keys) {
 const p = PROFILES[k];
 const pMag = Math.hypot(...p);
 const dot = p.reduce((s,val,i)=>s+val*u[i], 0);
 // 万一用户向量为零（极端情况），就退化成只比画像本身，避免除零
 sims[k] = (uMag === 0 || pMag === 0) ? 0 : dot / (uMag * pMag);
 }

 // 3) 排名：相似度最高的就是结果，后两名作为「次匹配」
 const ranked = keys.slice().sort((a,b)=>sims[b]-sims[a]);
 const top = ranked[0];
 return { key:top, easter:false, runners:ranked.slice(1,3), vec, sims };
}

function showResult() {
 const a = document.getElementById('app');
 const { key, vec, easter, runners } = calcResult();

 if (easter) {
 a.innerHTML = `<div class="result"><div class="result-emoji">🪰</div><div class="result-name" style="color:#6fcf97;">蛆</div><div class="result-tagline">……老版本彩蛋触发（1%概率）</div><div class="result-desc"><p>不是吧……你真的触发了 <strong>1% 的隐藏彩蛋</strong>。</p><p style="margin-top:10px;">老版本里不管选什么都是蛆。新版本有 12 种不同的动物——但你硬是抽中了大彩蛋。不知道这是运气好还是差。</p><p style="margin-top:10px;">建议你再测一次，这次应该不会了。大概。</p></div><button class="btn btn-green" onclick="restart()">🔄 再测一次（正经版）</button><a href="index.html" class="home-link">← 返回魔法店</a><p class="notice">1% 彩蛋 · 恭喜你，也算一种欧皇</p></div>`;
 return;
 }

 const c = ANIMALS[key];

 // 根据用户的五维向量生成性格画像条（中点为50，左右各代表一极）
 const dimsHtml = AXES.map(ax => {
 const raw = (vec && vec[ax.key]) || 0;
 const pos = Math.max(8, Math.min(92, 50 + (raw / 7) * 42)); // 把 ±7 映射到 8%~92%
 return `<div style="margin-bottom:10px;">
 <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;">
 <span>${ax.low}</span><span>${ax.high}</span></div>
 <div style="position:relative;height:6px;border-radius:3px;background:var(--border);">
 <div style="position:absolute;top:50%;left:${pos}%;width:12px;height:12px;border-radius:50%;background:${c.color};transform:translate(-50%,-50%);box-shadow:0 0 0 3px var(--card);"></div>
 </div></div>`;
 }).join('');
 const dimsBlock = `<div style="background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:14px;padding:18px 18px 8px;margin-bottom:16px;text-align:left;"><div style="font-size:12px;color:var(--green);font-weight:700;letter-spacing:1px;margin-bottom:14px;">📊 你的性格画像</div>${dimsHtml}</div>`;

 a.innerHTML = `<div class="result"><div class="result-emoji">${c.emoji}</div><div class="result-name" style="color:${c.color}">${c.name}</div><div class="result-tagline">${c.en} · 「${c.quote}」</div><div class="result-desc">${c.desc}</div>${dimsBlock}<div class="result-meta">${c.tags.map(t=>`<span class="meta-badge">${t}</span>`).join('')}</div>${runners.length?`<p style="font-size:12px;color:var(--muted);margin-bottom:16px;">次匹配：${runners.map(k=>ANIMALS[k].emoji+' '+ANIMALS[k].name).join(' · ')}</p>`:''}<button class="btn btn-green" onclick="shareIt('${key}')">📋 分享我的灵魂动物</button><button class="btn btn-ghost" onclick="restart()">🔄 再测一次</button><a href="index.html" class="home-link">← 返回魔法店</a><div style="text-align:center;margin-top:20px;padding-top:18px;border-top:1px solid var(--border);"><img src="images/qq-group.jpg" alt="QQ群二维码" style="width:130px;border-radius:12px;border:2px solid var(--border);margin-bottom:8px;"><p style="font-size:12px;color:var(--muted);"><strong style="color:var(--gold);">加群看更多乐子 还能玩MC服务器</strong><br>扫码进群，一起来玩</p></div><p style="font-size:11px;text-align:center;margin-top:8px;"><a href="https://space.bilibili.com/1029138222" target="_blank" style="color:var(--pink);text-decoration:none;">🅱 关注B站 · 霧雨魔法店</a></p><p class="notice">12 种动物 · ${QUESTIONS.length} 道题 · 五维匹配 · 1% 概率蛆彩蛋 · 雾雨魔法店出品</p></div>`;
}

function shareIt(key) {
 const c = ANIMALS[key];
 copyToClipboard('🐾 我测出来灵魂动物是【'+c.name+'】——「'+c.quote+'」你也来测测：' + window.location.href, '已复制！发给朋友测测 😈');
}
function restart() { idx = -1; answers = []; render(); }
render();
</script>
