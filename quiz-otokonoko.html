function renderQuestion(app) {

    '<div class="q-text">'+q.q+'</div>'+
    '<div class="options">';

  for (var i = 0; i < q.opts.length; i++) {

  html += '</div>';

  app.innerHTML = html;
}

function goBack() { if (idx > 0) { idx--; answers.pop(); render(); } }

function renderLoading(app) {

async function cycleLoading(i) {
  if (i >= LOADING_STEPS.length) {
    calcResult();
    state = 'result';
    render();
    return;
  }
  await sleep(500 + Math.random() * 400);
  var lt = document.getElementById('ltxt');
  if (lt) lt.textContent = LOADING_STEPS[i];
  cycleLoading(i+1);
}

function calcResult() {
  var a = 0, b = 0, c = 0, d = 0;
  for (var i = 0; i < answers.length; i++) {
    a += answers[i].s.a || 0;
    b += answers[i].s.b || 0;
    c += answers[i].s.c || 0;
    d += answers[i].s.d || 0;
  }
  var maxA = 58, maxB = 50, maxC = 59, maxD = 55;
  lastA = Math.round(a / maxA * 100);
  lastB = Math.round(b / maxB * 100);
  lastC = Math.round(c / maxC * 100);
  lastD = Math.round(d / maxD * 100);
  lastScore = Math.round((lastA + lastB + lastC + lastD) / 4);
}
