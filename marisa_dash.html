<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>魔理沙快跑 · 霧雨魔法店</title>
<script src="js/analytics.js"></script>
<script type="text/javascript" charset="UTF-8" src="https://cdn.adwork.net/js/makemoney.js" async></script>
<link rel="stylesheet" href="css/common.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1520'/><text x='16' y='25' text-anchor='middle' font-size='24' fill='%23f0c060'>✦</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1520;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;touch-action:manipulation;user-select:none;-webkit-user-select:none;overflow:hidden;height:100vh;}
.game-container{display:flex;align-items:center;justify-content:center;width:100%;height:calc(100vh - 48px);background:#1a1520;position:relative;overflow:hidden;}
canvas{display:block;width:auto;height:auto;max-width:100%;max-height:100%;aspect-ratio:960/360;image-rendering:pixelated;image-rendering:crisp-edges;border:1px solid #3a3045;border-radius:12px;}
.hud{position:absolute;top:16px;left:20px;right:20px;z-index:5;display:flex;justify-content:space-between;align-items:center;color:#8a7e9a;font-size:14px;flex-wrap:wrap;gap:4px;pointer-events:none;}
.hud>*{pointer-events:auto;}
.hud strong{color:#f0c060;font-weight:800;letter-spacing:1px;}
.hud span{font-size:12px;color:#aaa;margin-left:8px;}
.hud .scoreboard{text-align:right;}
.hud .scoreboard span{display:inline-block;margin-left:12px;font-size:16px;color:#e0d8ec;font-weight:700;}
.hud .scoreboard .bestscore{color:#8a7e9a;font-size:13px;font-weight:400;}
.hud .combo-badge{font-size:12px;color:#ffd700;margin-left:8px;opacity:0;transition:opacity .3s;}
.hud .combo-badge.show{opacity:1;}
.hud .dash-indicator{font-size:12px;color:#ff6b6b;margin-left:8px;animation:pulse .5s infinite alternate;display:none;}
.hud .dash-indicator.active{display:inline;}
@keyframes pulse{from{opacity:.5}to{opacity:1}}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,21,32,.92);z-index:10;border-radius:12px;overflow-y:auto;padding:20px;}
.overlay h1{font-size:28px;color:#f0c060;margin-bottom:8px;}
.overlay p{font-size:13px;color:#8a7e9a;text-align:center;line-height:1.8;margin-bottom:16px;max-width:420px;}
.overlay .btn-start{font-size:18px;font-weight:800;padding:14px 48px;border-radius:16px;border:none;background:linear-gradient(135deg,#f0c060,#e8a830);color:#1a1520;cursor:pointer;letter-spacing:2px;transition:transform .15s;margin-bottom:8px;}
.overlay .btn-start:hover{transform:scale(1.05);}
.overlay .btn-start:active{transform:scale(.95);}
.overlay.hide{display:none;}
.loading-text{color:#8a7e9a;font-size:14px;letter-spacing:1px;animation:pulse 1s infinite alternate;text-align:center;padding:40px 0;}
.mobile-controls{display:flex;justify-content:center;gap:64px;padding:0;position:absolute;bottom:20px;left:0;right:0;z-index:5;pointer-events:none;}
.mobile-controls>*{pointer-events:auto;}
.ctrl-btn{width:120px;height:72px;border-radius:16px;border:2px solid #3a3045;background:rgba(36,30,42,.9);color:#e0d8ec;font-size:18px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.ctrl-btn:active,.ctrl-btn.press{background:rgba(240,192,96,.15);border-color:#f0c060;}
/* 排行榜 */
#lbArea{margin-top:12px;width:100%;max-width:380px;}
#lbArea.hide{display:none;}
.lb-wrap{text-align:center;}
.lb-submit{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.lb-input{background:#241e2a;border:1px solid #3a3045;border-radius:10px;padding:8px 14px;color:#e0d8ec;font-size:13px;width:140px;outline:none;font-family:inherit;}
.lb-input:focus{border-color:#f0c060;}
.lb-btn{background:linear-gradient(135deg,#f0c060,#e8a830);border:none;border-radius:10px;padding:8px 20px;color:#1a1520;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
.lb-btn:disabled{opacity:.5;cursor:default;}
.lb-btn-ghost{background:transparent;border:1px solid #3a3045;border-radius:10px;padding:8px 16px;color:#8a7e9a;font-size:12px;cursor:pointer;font-family:inherit;}
.lb-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px;}
.lb-table th{color:#8a7e9a;font-weight:400;padding:5px 4px;border-bottom:1px solid #3a3045;}
.lb-table td{padding:5px 4px;color:#e0d8ec;border-bottom:1px solid rgba(58,48,69,0.3);}
.lb-table .lb-my td{color:#f0c060;font-weight:700;background:rgba(240,192,96,0.06);}
.lb-note,.lb-ok,.lb-err{font-size:12px;margin:6px 0;}
.lb-ok{color:#6fcf97;}
.lb-err{color:#ef4444;}
.lb-note{color:#8a7e9a;}
.lb-toggle{text-align:center;font-size:12px;color:#8a7e9a;cursor:pointer;padding:6px 0;margin-top:4px;transition:color .2s;}
.lb-toggle:hover{color:#f0c060;}
.lb-table-wrap{overflow-x:auto;}
</style>
</head>
<body>

<div id="shopNav"></div>
<script src="nav.js"></script>

<div class="game-container" aria-label="魔理沙快跑">
  <div class="hud" id="hud">
    <div>
      <strong>🧹 魔理沙快跑</strong>
      <span class="combo-badge" id="comboBadge">COMBO ×0</span>
      <span class="dash-indicator" id="dashInd">⚡ DASH</span>
    </div>
    <div class="scoreboard">
      <span id="grazeCount">擦弹 0</span>
      <span id="score">00000</span>
      <span class="bestscore" id="best">HI 00000</span>
    </div>
  </div>

  <canvas id="game" width="960" height="360"></canvas>

  <div class="overlay" id="loadingOverlay">
    <div class="loading-text">🧹 加载中...</div>
  </div>

  <div class="overlay hide" id="startOverlay">
    <h1>🧹 魔理沙快跑</h1>
    <p>⬆ 切换到上方通道<br>⬇ 切换到下方通道<br>X / Shift 使用 DASH 冲刺</p>
    <button class="btn-start" id="btnStart">✦ 起飞</button>
    <div id="lbArea" class="hide"></div>
    <div id="qqOverlay" class="hide" style="margin-top:16px;">
      <img src="images/qq-group.png" alt="QQ群二维码" style="width:100px;border-radius:12px;border:2px solid #3a3045;" onerror="this.style.display='none'">
      <p style="font-size:11px;color:#8a7e9a;margin-top:6px;">群号 702973928</p>
    </div>
  </div>

  <div class="mobile-controls" id="mobileControls">
    <button class="ctrl-btn" id="btnUp">⬆ 切换</button>
    <button class="ctrl-btn" id="btnDASH" style="font-size:14px;">⚡DASH</button>
    <button class="ctrl-btn" id="btnDown">⬇ 切换</button>
  </div>
</div>

<script src="js/marisa-runner.js"></script>

</body>
</html>
