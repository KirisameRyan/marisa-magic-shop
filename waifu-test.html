.result-desc.golden-desc {

/* ⭐ 漂浮闪光层 */

 '<div class="q-text">' + q.q + '</div>' +
 '<div class="options">';
 for (var i = 0; i < q.opts.length; i++) {
 html +=
 '<button class="opt-btn" onclick="answer(' + i + ')">' +
 '<span class="opt-letter">' + (labels[i] || '?') + '</span>' +
 q.opts[i].t +
 '</button>';
 }
 html += '</div>';
 app.innerHTML = html;
}

function answer(choice) {
 answers.push(QUESTIONS[idx].opts[choice]);
 idx++;
 quizSave(STORAGE_KEY, {idx: idx, answers: answers});
 if (idx < QUESTIONS.length) { render(); return; }
 advance();
}

function advance() {
 if (countPure() >= EGG_THRESHOLD) { state = 'egg'; }
 else { state = 'loading'; }
 render();
}

function countPure() {
 var n = 0;
 for (var i = 0; i < answers.length; i++) { if (answers[i].pure) n++; }
 return n;
}

function goBack() {
 if (answers.length === 0) return;
 if (state === 'egg') { answers.pop(); idx--; state = 'quiz'; render(); return; }
 if (state === 'quiz') { if (idx === 0) return; idx--; answers.pop(); render(); }
}

// ⭐ 彩蛋问题（金色特效）──
function renderEgg(app) {
 var c = document.getElementById('app').parentElement;
 if (c) { c.classList.add('golden-aura'); }
 app.innerHTML =
 '<div class="result" style="position:relative;">' +
 '<div class="egg-golden-bg"></div>' +
 '<div class="egg-rays"></div>' +
 '<div class="sparkle-layer" id="eggSparkles"></div>' +
 '<div class="egg-star">🌟</div>' +
 '<div class="result-label" style="position:relative;z-index:1;">隐藏问题 · 仅限纯爱党</div>' +
 '<div class="q-text" style="margin-top:10px;position:relative;z-index:1;">你……喜欢魔理沙吗？</div>' +
 '<p class="result-tagline" style="position:relative;z-index:1;">你一路都在选最干净的答案。这道题，魔法店必须问你。</p>' +
 '<button class="btn btn-yes" style="max-width:260px;margin:8px auto 0;position:relative;z-index:1;" onclick="chooseMarisa()">是 ☆</button>' +
 '<button class="btn btn-ghost btn-no" style="max-width:260px;margin:10px auto 0;position:relative;z-index:1;" onmouseenter="dodgeNo(this)" onclick="dodgeNo(this)">否</button>' +
 '<p class="notice" id="eggHint" style="visibility:hidden;position:relative;z-index:1;">这个选项坏掉了 ☆ —— 魔理沙不接受拒绝。</p>' +
 '</div>';
 spawnSparkles(document.getElementById('eggSparkles'), 16);
}

// 在指定容器内随机撒入闪光
function spawnSparkles(layer, n) {
 if (!layer) return;
 var glyphs = ['✦','✧','⭐','★','✨','＊','·'];
 for (var i = 0; i < n; i++) {
 var s = document.createElement('span');
 s.className = 'sparkle';
 s.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
 s.style.left = (Math.random() * 92 + 4) + '%';
 s.style.top = (Math.random() * 88 + 4) + '%';
 s.style.fontSize = (10 + Math.random() * 14).toFixed(0) + 'px';
 s.style.setProperty('--dur', (2.2 + Math.random() * 2.6).toFixed(2) + 's');
 s.style.setProperty('--delay', (Math.random() * 2.5).toFixed(2) + 's');
 layer.appendChild(s);
 }
}

// 「否」会逃跑，且提示只能选是
function dodgeNo(btn) {
 var dx = (Math.random() * 2 - 1) * 96;
 var dy = (Math.random() * 2 - 1) * 34;
 btn.style.transform = 'translate(' + dx.toFixed(0) + 'px,' + dy.toFixed(0) + 'px)';
 var h = document.getElementById('eggHint');
 if (h) h.style.visibility = 'visible';
}
function chooseMarisa() {
 resultKey = 'marisa';
 state = 'loading';
 render();
}

function renderLoading(app) {
 app.innerHTML =
 '<div class="loading-wrap">' +
 '<div class="loading-orb"></div>' +
 '<p class="loading-text" id="ltxt">' + LOADING_STEPS[0] + '</p>' +
 '</div>';
 cycleLoading(1);
}

async function cycleLoading(i) {
 if (i >= LOADING_STEPS.length) {
  await sleep(800);
  if (!resultKey) resultKey = calcResult();
  var r = RESULTS[resultKey];
  showReveal('💕 二次元鉴定完成', r.name, r.color || 'var(--gold)', '命运连线中…', function() {
   state = 'result';
   render();
  });
  return;
 }
 await sleep(500 + Math.random() * 400);
 var lt = document.getElementById('ltxt');
 if (lt) lt.textContent = LOADING_STEPS[i];
 cycleLoading(i + 1);
}

function calcResult() {
 var scores = {};
 for (var i = 0; i < SCORE_KEYS.length; i++) scores[SCORE_KEYS[i]] = 0;
 for (var i = 0; i < answers.length; i++) {
 var s = answers[i].s || {};
 for (var k in s) { if (scores[k] != null) scores[k] += s[k]; }
 }
 var best = -1;
 for (var i = 0; i < SCORE_KEYS.length; i++) {
 if (scores[SCORE_KEYS[i]] > best) best = scores[SCORE_KEYS[i]];
 }
 var top = [];
 for (var i = 0; i < SCORE_KEYS.length; i++) {
 if (scores[SCORE_KEYS[i]] === best) top.push(SCORE_KEYS[i]);
 }
 return top[Math.floor(Math.random() * top.length)];
}

// ⭐ 结果页（魔理沙金色特效）──
function renderResult(app) {
 var r = RESULTS[resultKey] || RESULTS[SCORE_KEYS[0]];
 var isMarisa = (resultKey === 'marisa');
 var nameColor = r.color || 'var(--gold)';

 var c = document.getElementById('app').parentElement;
 if (c) {
 if (isMarisa) c.classList.add('golden-aura');
 else c.classList.remove('golden-aura');
 }

 var pc = isMarisa ? ' golden' : '';
 var nc = isMarisa ? ' golden-shimmer' : '';
 var tc = isMarisa ? ' golden-tag' : '';
 var dc = isMarisa ? ' golden-desc' : '';

 var html =
 '<div class="result">' +
 '<img class="result-portrait' + pc + '" src="' + r.img + '" alt="' + r.name + '" ' +
 'onerror="this.style.display=\'none\'; var e=document.getElementById(\'remoji\'); if(e) e.style.display=\'inline-block\';">' +
 '<div class="result-emoji' + (isMarisa ? ' egg-star' : '') + '" id="remoji" style="display:none;">' + r.emoji + '</div>' +
 '<div class="result-label">霧雨魔法店 鉴定结果</div>' +
 '<div class="result-name' + nc + '" style="color:' + (isMarisa ? '' : nameColor) + '">' + r.name + '</div>' +
 '<div class="result-tagline">' + r.tagline + '</div>' +
 '<div class="result-desc' + dc + '">' + r.desc + '</div>' +
 '<div class="result-meta">';

 for (var i = 0; i < r.tags.length; i++) {
 html += '<span class="meta-tag' + tc + '">' + r.tags[i] + '</span>';
 }

 html +=
 '</div>' +
 '<button class="btn btn-main" onclick="shareImage()">📸 生成分享海报</button>' +
 '<button class="btn btn-ghost" onclick="shareIt()">📋 复制结果文案</button>' +
 '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>' +
  '<a href="index.html" class="home-link">← 返回魔法店</a>' +
  resultFooterHTML({notice:'霧雨魔法店 · 结果仅供参考 · 但魔法是真的'}) +
  '</div>';

 app.innerHTML = html;

 if (isMarisa) {
 var rd = app.querySelector('.result');
 if (rd) {
 var sl = document.createElement('div');
 sl.className = 'sparkle-layer';
 rd.insertBefore(sl, rd.firstChild);
 spawnSparkles(sl, 12);
 }
 }
}

function shareIt() {
 var name = (resultKey && RESULTS[resultKey]) ? RESULTS[resultKey].name : '';
 var text = SHARE_TEXT.replace('{name}', name) + ' ' + window.location.href;
 copyToClipboard(text, '已复制！发给朋友试试 😈');
}

function restart() {
 var c = document.getElementById('app').parentElement;
 if (c) c.classList.remove('golden-aura');
 state = 'intro'; idx = 0; answers = []; resultKey = null; render();
}

function shareImage() { state = 'poster'; render(); }

function renderPoster(app) {
 app.innerHTML =
 '<div class="poster-wrap">' +
 '<div class="result-label" style="margin-bottom:14px;">长按图片保存 / 分享</div>' +
 '<img class="poster-img" id="posterImg" alt="分享海报" style="display:none;">' +
 '<div class="loading-wrap" id="posterLoading" style="padding:24px 0;">' +
 '<div class="loading-orb"></div>' +
 '<p class="loading-text">正在生成海报…</p>' +
 '</div>' +
 '<p class="poster-hint">手机长按上图即可保存到相册；电脑可点下方按钮下载。</p>' +
 '<a class="btn btn-main" id="posterDl" download="二次元老婆鉴定结果.png" style="display:none;">⬇️ 下载海报</a>' +
 '<button class="btn btn-ghost" onclick="state=\'result\';render();">← 返回结果</button>' +
 '</div>';
 buildPoster();
}




async function buildPoster() {
 var r = RESULTS[resultKey] || RESULTS[SCORE_KEYS[0]];
 var W = POSTER_W, H = POSTER_H;
 var cv = document.createElement('canvas');
 cv.width = W; cv.height = H;
 var ctx = cv.getContext('2d');

 ctx.fillStyle = '#1a1520'; ctx.fillRect(0, 0, W, H);
 var g = ctx.createLinearGradient(0, 0, W, H);
 g.addColorStop(0, 'rgba(176,159,255,.10)');
 g.addColorStop(1, 'rgba(240,192,96,.06)');
 ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

 var pad = 40;
 ctx.fillStyle = '#241e2a';
 roundRect(ctx, pad, pad, W - pad * 2, H - pad * 2, 28); ctx.fill();
 var bar = ctx.createLinearGradient(pad, 0, W - pad, 0);
 bar.addColorStop(0, '#f0c060'); bar.addColorStop(.5, '#b89fff'); bar.addColorStop(1, '#f0c060');
 ctx.fillStyle = bar;
 roundRect(ctx, pad, pad, W - pad * 2, 6, 3); ctx.fill();

 ctx.textAlign = 'center';
 ctx.fillStyle = '#f0c060';
 ctx.font = '600 20px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 ctx.fillText('霧 雨 魔 法 店 · 二次元老婆鉴定', W / 2, 110);

 var portrait = await loadImg(r.img);
 var cx = W / 2, cy = 250, R = 92;

 // ⭐ 魔理沙海报金光
 if (resultKey === 'marisa') {
 var glow = ctx.createRadialGradient(cx, cy, R * .6, cx, cy, R * 1.5);
 glow.addColorStop(0, 'rgba(240,192,96,.25)');
 glow.addColorStop(.5, 'rgba(240,192,96,.08)');
 glow.addColorStop(1, 'rgba(240,192,96,0)');
 ctx.fillStyle = glow; ctx.fillRect(cx - R * 1.5, cy - R * 1.5, R * 3, R * 3);
 }

 ctx.save();
 ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
 if (portrait) {
 var s = Math.max((R * 2) / portrait.width, (R * 2) / portrait.height);
 var dw = portrait.width * s, dh = portrait.height * s;
 ctx.drawImage(portrait, cx - dw / 2, cy - dh / 2, dw, dh);
 } else {
 ctx.fillStyle = '#1a1520'; ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
 ctx.fillStyle = '#fff'; ctx.font = '96px sans-serif'; ctx.textBaseline = 'middle';
 ctx.fillText(r.emoji, cx, cy + 6); ctx.textBaseline = 'alphabetic';
 }
 ctx.restore();

 // ⭐ 魔理沙双环金边
 ctx.lineWidth = resultKey === 'marisa' ? 6 : 5;
 ctx.strokeStyle = r.hex || '#f0c060';
 ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();
 if (resultKey === 'marisa') {
 ctx.lineWidth = 2;
 ctx.strokeStyle = 'rgba(255,232,176,.6)';
 ctx.beginPath(); ctx.arc(cx, cy, R + 4, 0, Math.PI * 2); ctx.stroke();
 }

 ctx.fillStyle = '#8a7e9a';
 ctx.font = '14px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 ctx.fillText('我命中注定的二次元老婆是', W / 2, 405);
 ctx.fillStyle = r.hex || '#f0c060';
 ctx.font = '800 46px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';

 // ⭐ 魔理沙名字金色阴影
 if (resultKey === 'marisa') {
 ctx.shadowColor = 'rgba(240,192,96,.4)'; ctx.shadowBlur = 12;
 }
 ctx.fillText(r.name, W / 2, 462);
 ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

 ctx.fillStyle = '#8a7e9a';
 ctx.font = '15px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 ctx.fillText(r.tagline, W / 2, 492);

 ctx.font = '13px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 var tags = r.tags, gap = 12, ty = 540;
 var widths = tags.map(function(t) { return ctx.measureText(t).width + 28; });
 var totalW = widths.reduce(function(a, b) { return a + b; }, 0) + gap * (tags.length - 1);
 var tx = (W - totalW) / 2;
 for (var i = 0; i < tags.length; i++) {
 ctx.fillStyle = 'rgba(255,255,255,.04)';
 ctx.strokeStyle = resultKey === 'marisa' ? 'rgba(240,192,96,.3)' : '#3a3045';
 ctx.lineWidth = 1;
 roundRect(ctx, tx, ty - 19, widths[i], 30, 15); ctx.fill(); ctx.stroke();
 ctx.fillStyle = resultKey === 'marisa' ? '#f0c060' : '#b89fff';
 ctx.fillText(tags[i], tx + widths[i] / 2, ty);
 tx += widths[i] + gap;
 }

 var plain = r.desc.replace(/<br\s*\/?>(\s*)/gi, '\n').split('\n')[0];
 ctx.fillStyle = '#e0d8ec';
 ctx.font = '15px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';
 wrapText(ctx, plain, W / 2, 600, W - pad * 2 - 60, 26);

 var siteImg = await loadImg(QR_IMG);
 var qqImg = await loadImg(QQ_IMG);
 var qs = 132, gap2 = 48;
 var totalQW = qs * 2 + gap2;
 var leftX = (W - totalQW) / 2;
 var rightX = leftX + qs + gap2;
 var qy = H - pad - 232;
 drawQRBox(ctx, siteImg, leftX, qy, qs, '扫码开测', SITE_URL, '#f0c060');
 drawQRBox(ctx, qqImg, rightX, qy, qs, '加 QQ 群', '群号 ' + QQ_GROUP, '#b89fff');

 var pi = document.getElementById('posterImg');
 var pl = document.getElementById('posterLoading');
 var dl = document.getElementById('posterDl');
 var dataUrl = null;
 try { dataUrl = cv.toDataURL('image/png'); } catch (e) { dataUrl = null; }

 if (pl) { pl.style.display = 'none'; }

 if (dataUrl) {
 if (pi) { pi.src = dataUrl; pi.style.display = 'block'; }
 if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; }
 } else {
 if (pi && pi.parentNode) {
 cv.className = 'poster-img';
 cv.style.display = 'block';
 pi.parentNode.replaceChild(cv, pi);
 }
 var hint = document.querySelector('.poster-hint');
 if (hint) hint.textContent = '当前环境无法导出图片。部署到 ' + SITE_URL + ' 线上访问即可正常保存。';
 }
}


render();
</script>
