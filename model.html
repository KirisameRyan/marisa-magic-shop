<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="js/analytics.js"></script>
<script src="js/page-base.js"></script>
<!-- 🔧 改标题 -->
<title>新页面 · 霧雨魔法店</title>
<link rel="stylesheet" href="css/common.css">
<!-- 🔧 页面特有样式写这里(主题染色/容器宽度等,不要重复 common.css 已有的组件) -->
</head>
<body>

<div id="shopNav"></div>
<script src="nav.js"></script>

<div class="container" id="app">
  <!-- 由 quiz.render() 填充 -->
</div>

<script src="js/utils.js"></script>
<script src="js/reveal-screen.js"></script>
<script src="js/quiz-storage.js"></script>
<script src="js/quiz-stats.js"></script>
<script src="js/result-footer.js"></script>
<script src="js/quiz-engine.js"></script>
<!-- 可选模块:
     <script src="js/canvas-utils.js"></script><script src="js/poster.js"></script>  分享海报
     <script src="js/radar.js"></script>      雷达图
     <script src="js/particles.js"></script>  粒子特效
-->
<script>
/* ===========================================
   🔧 新测试页模板 —— 基于 MQ.engine
   状态机 intro → quiz → loading → reveal → result
   全部由引擎驱动,这里只需改 DATA 和两处渲染
   =========================================== */

var STORAGE_KEY = 'quiz_model_v1';  // 🔧 唯一,格式 quiz_xxx_v1
var TRACK_KEY = 'model_take';       // 🔧 唯一,格式 xxx_take

// ==================== 🔧 DATA:改这里 ====================

var QUIZ_TITLE = '你的新测试';
var QUIZ_SUBTITLE = '副标题 —— 描述一下这是干嘛的';
var BADGE_TEXT = '霧雨魔法店 · 新商品';

var QUESTIONS = [
  // 每题:{ q:'题目', opts:[{txt:'选项', scores:{type_a:2}}, …] }
  { q: '第一题？', opts: [{txt:'选项一',scores:{type_a:1}}, {txt:'选项二',scores:{type_b:1}}, {txt:'选项三',scores:{type_a:2}}, {txt:'选项四',scores:{type_b:2}}] },
  { q: '第二题？', opts: [{txt:'选项一',scores:{type_a:1}}, {txt:'选项二',scores:{type_b:1}}, {txt:'选项三',scores:{type_a:2}}, {txt:'选项四',scores:{type_b:2}}] },
  { q: '第三题？', opts: [{txt:'选项一',scores:{type_a:1}}, {txt:'选项二',scores:{type_b:1}}, {txt:'选项三',scores:{type_a:2}}, {txt:'选项四',scores:{type_b:2}}] },
  { q: '最后一题？', opts: [{txt:'选项一',scores:{type_a:1}}, {txt:'选项二',scores:{type_b:1}}, {txt:'选项三',scores:{type_a:2}}, {txt:'选项四',scores:{type_b:2}}] },
];

var RESULTS = {
  // key → { name, emoji, color, tagline, desc, tags[] }
  type_a: {
    name: '结果A', emoji: '🎯', color: '#f0c060', tagline: '一句话描述',
    desc: '详细描述……<br><br>可以多段。',
    tags: ['标签1', '标签2', '标签3']
  },
  type_b: {
    name: '结果B', emoji: '🎨', color: '#b89fff', tagline: '一句话描述',
    desc: '详细描述……',
    tags: ['标签1', '标签2']
  },
};

var LOADING_STEPS = ['正在分析…', '计算结果中…', '马上好…'];

// ==================== 🔧 结果计算 ====================

function calcResult(answers) {
  var scores = {};
  for (var k in RESULTS) scores[k] = 0;
  for (var i = 0; i < answers.length; i++) {
    var s = answers[i].scores || {};
    for (var key in s) scores[key] = (scores[key] || 0) + s[key];
  }
  var top = null, best = -1;
  for (var k in scores) { if (scores[k] > best) { best = scores[k]; top = k; } }
  return { key: top || 'type_a', scores: scores };
}

// ==================== 引擎装配(一般不用改)====================

var quiz = MQ.engine({
  questions: QUESTIONS,
  storageKey: STORAGE_KEY,
  trackKey: TRACK_KEY,
  loadingSteps: LOADING_STEPS,
  reveal: {
    title: '✨ 鉴定完成',
    code: function(r) { return RESULTS[r.key].name; },
    color: function(r) { return RESULTS[r.key].color; },
    hint: '结果生成中…'
  },
  calcResult: calcResult,

  // ── 🔧 首页 ──
  renderIntro: function(app, api) {
    app.innerHTML =
      '<div class="intro">' +
        '<div class="intro-badge">' + BADGE_TEXT + '</div>' +
        '<h1>' + QUIZ_TITLE + '</h1>' +
        '<p class="sub">' + QUIZ_SUBTITLE + '</p>' +
        '<button class="btn btn-main" style="max-width:260px;margin:0 auto;" onclick="startQuiz()">开始测试 →</button>' +
        api.resumeBtn() +
        '<a href="index.html" class="home-link">← 返回魔法店</a>' +
        '<p style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px;" id="takeCount"></p>' +
      '</div>';
    // 人数统计(线上显示,线下自动隐藏)
    api.bindCount('takeCount', {template: '已有 {n} 人完成测试'});
  },

  // ── 🔧 结果页 ──
  renderResult: function(app, r) {
    var c = RESULTS[r.key];
    var html =
      '<div class="result">' +
        '<div class="result-emoji">' + c.emoji + '</div>' +
        '<div class="result-label">霧雨魔法店 鉴定结果</div>' +
        '<div class="result-name" style="color:' + c.color + '">' + c.name + '</div>' +
        '<div class="result-tagline">' + c.tagline + '</div>' +
        '<div class="result-desc">' + c.desc + '</div>' +
        '<div class="result-meta">';
    for (var i = 0; i < c.tags.length; i++) html += '<span class="meta-tag">' + c.tags[i] + '</span>';
    html +=
        '</div>' +
        '<button class="btn btn-main" onclick="shareIt()">📋 复制结果发给朋友</button>' +
        '<button class="btn btn-ghost" onclick="restart()">🔄 再来一次</button>' +
        '<a href="index.html" class="home-link">← 返回魔法店</a>' +
        resultFooterHTML({notice: '霧雨魔法店 · 结果仅供参考 · 但魔法是真的'}) +
      '</div>';
    app.innerHTML = html;
    lastResult = r;
  }
});

// ── 🔧 分享 ──
var lastResult = null;
function shareIt() {
  var c = lastResult ? RESULTS[lastResult.key] : null;
  var text = (c ? '我在霧雨魔法店测出来是【' + c.name + '】！' : '我在霧雨魔法店测完啦！') +
    '你也来测测:' + window.location.href;
  copyToClipboard(text, '已复制！发给朋友试试 😈');
}

// ==================== 启动 ====================
quiz.render();
</script>

</body>
</html>
