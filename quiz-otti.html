async function cycleLoading(i) {
  var steps = ['正在分析行为模式…','正在比对人格数据库…','正在匹配你的OTTI人格…'];
  if (i >= steps.length) { calcResult(); if (state !== 'troll') state = (confPct < 20 ? 'lowconf' : 'reveal'); render(); return; }
  await sleep(500 + Math.random() * 400);
  var lt = document.getElementById('ltxt'); if (lt) lt.textContent = steps[i];
  cycleLoading(i+1);
}

function calcResult() {
  var scores = {R:0,W:0,H:0,G:0,T:0,B:0,Q:0,P:0};
  for (var i = 0; i < answers.length; i++) {
    var a = answers[i];
    if (a.v > 0) scores[a.d] += Math.abs(a.v);
    else if (a.v < 0) {       var opp = {R:'W',W:'R', H:'G',G:'H', T:'B',B:'T', Q:'P',P:'Q'}[a.d]; scores[opp] += Math.abs(a.v); }
  }
  lastScores = scores;
  // 整活检测：全选同一个值
  var allSame = true, firstV = answers[0].v;
  for (var i = 1; i < answers.length; i++) if (answers[i].v !== firstV) { allSame = false; break; }
  if (allSame) { state = 'troll'; firstV_var = firstV; return; }
  // 置信度
  var nonZero = 0; for (var i = 0; i < answers.length; i++) if (answers[i].v !== 0) nonZero++;
  confPct = Math.round(nonZero / answers.length * 100);
  // 每维决定（平局随机）
  function pickDim(a,b) { var sa = scores[a]||0, sb = scores[b]||0; if (sa>sb) return a; if (sb>sa) return b; return Math.random()<0.5 ? a : b; }
  var t1 = pickDim('R','W'), t2 = pickDim('H','G'), t3 = pickDim('T','B'), t4 = pickDim('Q','P');
  lastType = t1+t2+t3+t4;
  // 多平局 → 候选随机
  var undecided = 0; if (scores.R===scores.W) undecided++; if (scores.H===scores.G) undecided++; if (scores.T===scores.B) undecided++; if (scores.Q===scores.P) undecided++;
  if (undecided >= 2) {
    var candidates = [];
    for (var i = 0; i < KEYS.length; i++) {
      var k = KEYS[i], match = true;
      if (scores.R!==scores.W && k[0]!==t1) match = false;
      if (scores.H!==scores.G && k[1]!==t2) match = false;
      if (scores.T!==scores.B && k[2]!==t3) match = false;
      if (scores.Q!==scores.P && k[3]!==t4) match = false;
      if (match) candidates.push(k);
    }
    if (candidates.length > 0) lastType = candidates[Math.floor(Math.random() * candidates.length)];
  }
}

function countUp(el, end, duration) {
  var cur = 0, step = Math.max(1, Math.round(end / (duration/16)));
  var timer = setInterval(function() {
    cur = Math.min(cur + step, end);
    if (el) el.textContent = cur + '%';
    if (cur >= end) clearInterval(timer);
  }, 16);
}

  'Q':'你对表达有保留，不会在每个群里当显眼包，也不会急着在争议里表态。你更享受观察和思考的安静，而非被推到话筒前的焦灼。你不吵，但你并不是没想法——只是在夜深人静或真正被需要时，你的声音才更有分量。',
  'P':'你很难憋住不说，看到了就想说一句，有观点就想表达。这对你来说不是负担，是需要。你可能发完消息反复看有没有人回，也可能深夜突然想找人聊天——这都是你与世界连接的方式。你的热情和开放让你在人群里容易被注意到，只是有时也需要留意：一些场合适度收一收反而更有力。',
  'QP':'你既不是话匣子也不是完美潜行者。该说的时候你也会说，但不会每一场讨论都参与。你是一条分得清"值得"与"不值"的河——有些场合你把自己关起来，有些场合你全情投入。总的来说，你懂得在说话与沉默之间找到属于你的平衡。'
};

var detailShown = false;
function toggleDetail() {
  var panel = document.getElementById('detailPanel');
  var btn = document.querySelector('.btn-detail');
  if (!panel) return;
  if (!detailShown) {
    panel.innerHTML = buildDetailHTML();
    panel.classList.add('show');
    btn.innerHTML = '📊 收起解析 ▴';
  } else {
    panel.classList.remove('show');
    btn.innerHTML = '📊 查看详细解析 ▾';
  }
  detailShown = !detailShown;
}

function buildDetailHTML() {
  var scores = lastScores;
  var dims = [
    {a:'R',b:'W',key:'RW',title:'🎭 网上身份',la:'角色',lb:'本我'},
    {a:'H',b:'G',key:'HG',title:'🎪 内容来源',la:'有活',lb:'跟风'},
    {a:'T',b:'B',key:'TB',title:'🗿 防御力',la:'铁',lb:'玻璃'},
    {a:'Q',b:'P',key:'QP',title:'👻 表达欲',la:'潜水',lb:'开麦'}
  ];
  var html = '';
  for (var i = 0; i < dims.length; i++) {
    var d = dims[i], sa = scores[d.a]||0, sb = scores[d.b]||0;
    var gap = sa - sb;
    var cat = (Math.abs(gap) <= 2) ? d.key : (gap > 0 ? d.a : d.b);
    var label = (Math.abs(gap) <= 2) ? '均衡' : (gap > 0 ? '偏'+d.la : '偏'+d.lb);
    html += '<div class="detail-item"><div class="d-title">'+d.title+' · '+label+'<span style="font-size:10px;color:var(--muted);font-weight:400;">（'+d.a+' '+sa+' vs '+d.b+' '+sb+'）</span></div><div class="d-text">'+DETAIL_TEXTS[cat]+'</div></div>';
  }
  return html;
}

function shareImage() { state = 'poster'; render(); }

function renderPoster(app) {
  app.innerHTML = '<div class="poster-wrap"><div class="result-label" style="font-size:14px;color:var(--muted);margin-bottom:14px;">长按图片保存 / 分享</div><img class="poster-img" id="posterImg" alt="分享海报"><div class="loading-wrap" id="posterLoading"><div class="loading-orb"></div><p class="loading-text">正在生成海报…</p></div><p class="poster-hint">手机长按上图即可保存；电脑可点下方下载。</p><a class="btn btn-main" id="posterDl" download="OTTI人格测试.png" style="display:none;">⬇️ 下载海报</a><button class="btn btn-ghost" onclick="state=\'result\';render();">← 返回结果</button></div>';
  buildPoster();
}

async function buildPoster() {
  var p = PERSONAS[lastType] || PERSONAS['WGBP'];
  var scores = lastScores;
  var W = POSTER_W, H = POSTER_H, pad = 36;
  var cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');
  var FONT = '-apple-system,"PingFang SC","Microsoft YaHei",sans-serif';

  ctx.fillStyle = '#1a1520'; ctx.fillRect(0, 0, W, H);
  var g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, 'rgba(14,165,233,.08)'); g.addColorStop(1, 'rgba(99,102,241,.05)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#241e2a'; roundRect(ctx, pad, pad, W - pad*2, H - pad*2, 24); ctx.fill();
  var bar = ctx.createLinearGradient(pad, 0, W - pad, 0);
  bar.addColorStop(0, p.color); bar.addColorStop(.5, '#f0c060'); bar.addColorStop(1, p.color);
  ctx.fillStyle = bar; roundRect(ctx, pad, pad, W - pad*2, 5, 3); ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ea5e9'; ctx.font = '600 15px ' + FONT;
  ctx.fillText('🎭 OTTI16型人格测试', W/2, 76);

  // ✦ 粒子
  ctx.fillStyle = 'rgba(240,192,96,.12)'; ctx.font = '13px ' + FONT;
  for (var si = 0; si < 5; si++) ctx.fillText('✦', 50+Math.random()*(W-100), 50+Math.random()*(H-100));

  // 头像 + 光环
  var avaImg = await loadImg(p.img);
  var acy = 158, ar = 40;
  ctx.beginPath(); ctx.arc(W/2, acy, ar+3, 0, Math.PI*2);
  ctx.strokeStyle = p.color; ctx.lineWidth = 2; ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.arc(W/2, acy, ar, 0, Math.PI*2); ctx.clip();
  if (avaImg) ctx.drawImage(avaImg, W/2-ar, acy-ar, ar*2, ar*2);
  else { ctx.fillStyle = p.color+'33'; ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = '40px sans-serif'; ctx.textAlign = 'center'; ctx.fillText((p.c||'?').charAt(0), W/2, 205); }
  ctx.restore();

  ctx.fillStyle = p.color; ctx.font = '700 22px ' + FONT;
  ctx.fillText(p.n, W/2, 230);
  var codeW = ctx.measureText(p.c).width + 24;
  roundRect(ctx, W/2 - codeW/2, 238, codeW, 22, 11);
  ctx.fillStyle = p.color+'22'; ctx.fill();
  ctx.strokeStyle = p.color+'55'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = p.color; ctx.font = '600 13px ' + FONT;
  ctx.fillText(p.c, W/2, 254);

  var dimCfg = [
    {a:'R',b:'W',t:'🎭 网上身份',ca:'#0ea5e9',cb:'#f59e0b'},
    {a:'H',b:'G',t:'🎪 内容来源',ca:'#8b5cf6',cb:'#ec4899'},
    {a:'T',b:'B',t:'🗿 防御力',ca:'#10b981',cb:'#ef4444'},
    {a:'Q',b:'P',t:'👻 表达欲',ca:'#6366f1',cb:'#f97316'}
  ];
  var dy = 280, cardH = 36;
  ctx.textAlign = 'left';
  for (var di3 = 0; di3 < dimCfg.length; di3++) {
    var d2 = dimCfg[di3], sa2 = scores[d2.a]||0, sb2 = scores[d2.b]||0, sum2 = sa2+sb2||1;
    var pa2 = Math.round(sa2/sum2*100);
    ctx.fillStyle = 'rgba(255,255,255,.025)'; roundRect(ctx, pad+10, dy, W-pad*2-20, cardH, 9); ctx.fill();
    ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT;
    ctx.fillText(d2.t, pad+20, dy+15);
    var bx = pad + 155, bw = W-pad*2-215, bh = 9;
    ctx.fillStyle = '#3a3045'; roundRect(ctx, bx, dy+13, bw, bh, 5); ctx.fill();
    ctx.fillStyle = d2.cb; roundRect(ctx, bx, dy+13, bw, bh, 5); ctx.fill();
    ctx.fillStyle = d2.ca; roundRect(ctx, bx, dy+13, bw*pa2/100, bh, 5); ctx.fill();
    ctx.font = '9px ' + FONT; ctx.textAlign = 'right';
    ctx.fillStyle = sa2>sb2?'#f0c060':d2.ca; ctx.fillText(d2.a+' '+sa2, bx-4, dy+10);
    ctx.fillStyle = sb2>sa2?'#f0c060':d2.cb; ctx.fillText(sb2+' '+d2.b, bx+bw+4, dy+10);
    ctx.textAlign = 'left';
    dy += cardH + 7;
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(240,192,96,.6)'; ctx.font = 'bold 10px ' + FONT;
  ctx.fillText('置信度 '+confPct+'%', W/2, dy+6);
  dy += 16;
  var descLines = wrapToLines(ctx, p.desc, W-pad*2-30);
  ctx.fillStyle = '#8a7e9a'; ctx.font = '12px ' + FONT;
  for (var j = 0; j < descLines.length && j < 2; j++) ctx.fillText(descLines[j], W/2, dy + 8 + j*20);
  dy += Math.min(descLines.length,2)*20 + 12;

  if (lastCount > 0) {
    ctx.fillStyle = '#f0c060'; ctx.font = 'bold 11px ' + FONT;
    ctx.fillText('第 '+lastCount+' 个 '+(p.c||'?')+' 型人格 · 占比 '+lastPercent+'%', W/2, dy);
    dy += 20;
  }

  var siteImg = await loadImg(QR_IMG), qqImg = await loadImg(QQ_IMG);
  var qs = 86, gap = 26, tqw = qs*2+gap;
  var lx = (W-tqw)/2, qY = Math.max(dy+6, H-pad-136);
  drawQRBox(ctx, siteImg, lx, qY, qs, '扫码开测', SITE_URL, '#f0c060');
  drawQRBox(ctx, qqImg, lx+qs+gap, qY, qs, '加 QQ 群', '群号 '+QQ_GROUP, '#b89fff');

  ctx.textAlign = 'center';
  ctx.fillStyle = '#8a7e9a'; ctx.font = '11px ' + FONT;
  ctx.fillText('霧雨魔法店 · OTTI人格测试 · 纯属娱乐 ✨', W/2, H-pad-12);

  var pi = document.getElementById('posterImg'), pl = document.getElementById('posterLoading'), dl = document.getElementById('posterDl');
  var dataUrl = null;
  try { dataUrl = cv.toDataURL('image/png'); } catch(e) { dataUrl = null; }
  if (pl) pl.style.display = 'none';
  if (dataUrl) { if (pi) { pi.src = dataUrl; pi.style.display = 'block'; } if (dl) { dl.href = dataUrl; dl.style.display = 'inline-flex'; } }
  else { if (pi && pi.parentNode) { cv.className = 'poster-img'; cv.style.display = 'block'; pi.parentNode.replaceChild(cv, pi); } var hint = document.querySelector('.poster-hint'); if (hint) hint.textContent = '当前环境无法导出图片，部署到线上即可正常保存。'; }
}

injectAds();
render();
</script>
